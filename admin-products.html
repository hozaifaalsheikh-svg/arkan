<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المنتجات | شركة أركان</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #1a365d; --bg-color: #f8f9fa; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-color); padding: 20px; }
        .admin-container { max-width: 900px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { background-color: var(--primary-color); color: white; padding: 15px; font-weight: 600; }
        th:first-child { border-radius: 0 10px 0 0; }
        th:last-child { border-radius: 10px 0 0 0; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        
        .btn-edit { background: #3498db; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .btn-edit:hover { background: #2980b9; }

        @media (max-width: 600px) { 
            .hide-on-mobile { display: none !important; } 
            body { font-size: 13px; }
            th, td { padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>إدارة المنتجات</h1>
            <a href="admin.html" style="background:#1a365d; color:#fff; padding:10px 15px; border-radius:8px; text-decoration:none;"><i class="fas fa-arrow-right"></i> عودة</a>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>الاسم</th><th>البراند</th><th>السعر</th><th class="hide-on-mobile">الوصف</th><th>تعديل</th></tr>
                </thead>
                <tbody id="products-table-body"><tr><td colspan="5" style="text-align:center;">جاري التحميل...</td></tr></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const client = window.supabase.createClient("https://aalpziidoobrqeppsvmi.supabase.co", "sb_publishable_Dzt7QBcxmcidwgZE3rkQcA_yoKmje1w");
        
        async function fetchProducts() {
            const { data: products } = await client.from('inventory').select('*');
            let html = '';
            products.forEach(p => {
                html += `<tr>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.brand||'-'}</td>
                    <td>${Number(p.price).toLocaleString()}</td>
                    <td class="hide-on-mobile">${p.description ? p.description.substring(0, 30) : '-'}</td>
                    <td><button class="btn-edit" onclick="openEditModal('${p.sku}', '${p.name}', ${p.price})">تعديل</button></td>
                </tr>`;
            });
            document.getElementById('products-table-body').innerHTML = html;
        }

        function openEditModal(sku, name, price) {
            Swal.fire({
                title: 'تعديل السعر',
                input: 'number',
                inputValue: price,
                confirmButtonText: 'حفظ التعديلات',
                showCancelButton: true,
                cancelButtonText: 'إلغاء'
            }).then((res) => {
                if (res.isConfirmed) {
                    client.from('inventory').update({ price: res.value }).eq('sku', sku).then(() => {
                        Swal.fire('تم!', 'تم تحديث السعر بنجاح.', 'success');
                        fetchProducts();
                    });
                }
            });
        }
        fetchProducts();
    </script>
</body>
</html>
