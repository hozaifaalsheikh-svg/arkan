<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المنتجات | شركة أركان</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary-color: #1a365d; --secondary-color: #f27a1a; --bg-color: #f4f7f6; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; }
        .admin-container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .admin-header h1 { color: var(--primary-color); margin: 0; font-size: 24px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px 15px; text-align: right; border-bottom: 1px solid #ddd; }
        th { background-color: var(--primary-color); color: white; font-weight: 600; }
        tr:hover { background-color: #f9f9f9; }
        
        .btn-edit { background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-edit:hover { background: #2980b9; }
        .loading-text { text-align: center; padding: 40px; font-size: 18px; color: #666; }
        
        .swal-input-group { margin-bottom: 15px; text-align: right; }
        .swal-input-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        .swal-custom-input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .admin-container { padding: 15px 10px; }
            .admin-header { flex-direction: column; gap: 12px; text-align: center; }
            th, td { padding: 8px 10px; font-size: 12px; white-space: nowrap; }
            td img { width: 30px; height: 30px; }
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-boxes"></i> إدارة المنتجات</h1>
            <a href="admin.html" style="color: var(--primary-color); text-decoration: none; font-weight: bold;"><i class="fas fa-arrow-left"></i> العودة للوحة الرئيسية</a>
        </div>

        <div style="margin-bottom: 20px; position: relative;">
            <i class="fas fa-search" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #aaa;"></i>
            <input type="text" id="table-search" placeholder="ابحث في المنتجات..." style="width: 100%; padding: 12px 40px 12px 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
        </div>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>SKU</th>
                        <th>الصورة</th>
                        <th>الاسم</th>
                        <th>البراند</th>
                        <th>السعر</th>
                        <th>الوصف</th>
                        <th>التحكم</th>
                    </tr>
                </thead>
                <tbody id="products-table-body">
                    <tr><td colspan="7" class="loading-text">جاري جلب البيانات...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const SUPABASE_URL = "https://aalpziidoobrqeppsvmi.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_Dzt7QBcxmcidwgZE3rkQcA_yoKmje1w"; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let allProducts = [];

        async function fetchProducts() {
            const tableBody = document.getElementById('products-table-body');
            const { data: products, error } = await supabaseClient.from('inventory').select('*');
            if (error) { tableBody.innerHTML = '<tr><td colspan="7" style="color:red; text-align:center;">خطأ في الاتصال</td></tr>'; return; }
            allProducts = products;
            
            let html = '';
            products.forEach(p => {
                html += `<tr>
                    <td>${p.sku}</td>
                    <td><img src="${p.image_url || 'https://via.placeholder.com/50'}" width="40" height="40" style="border-radius:4px;"></td>
                    <td>${p.name}</td>
                    <td>${p.brand || '-'}</td>
                    <td>${Number(p.price).toLocaleString()}</td>
                    <td style="max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${p.description || ''}</td>
                    <td><button class="btn-edit" onclick="openEditModal('${p.sku}')">تعديل</button></td>
                </tr>`;
            });
            tableBody.innerHTML = html;
        }

        function openEditModal(sku) {
            const p = allProducts.find(x => x.sku === sku);
            Swal.fire({
                title: 'تعديل المنتج',
                html: `<input id="name" class="swal-custom-input" value="${p.name}">
                       <input id="price" type="number" class="swal-custom-input" value="${p.price}">
                       <textarea id="desc" class="swal-custom-input">${p.description}</textarea>`,
                preConfirm: () => ({ name: document.getElementById('name').value, price: document.getElementById('price').value, description: document.getElementById('desc').value })
            }).then((res) => {
                if (res.isConfirmed) updateProduct(sku, res.value);
            });
        }

        async function updateProduct(sku, data) {
            await supabaseClient.from('inventory').update(data).eq('sku', sku);
            fetchProducts();
        }

        // تفعيل البحث
        document.getElementById('table-search').addEventListener('keyup', function() {
            let val = this.value.toLowerCase();
            document.querySelectorAll('tbody tr').forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(val) ? '' : 'none';
            });
        });

        fetchProducts();
    </script>
</body>
</html>
