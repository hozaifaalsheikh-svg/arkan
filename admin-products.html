<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المنتجات | شركة أركان</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary-color: #1a365d; --secondary-color: #f27a1a; --bg-color: #f4f7f6; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; }
        .admin-container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .admin-header h1 { color: var(--primary-color); margin: 0; font-size: 24px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px 15px; text-align: right; border-bottom: 1px solid #ddd; }
        th { background-color: var(--primary-color); color: white; }
        
        .btn-edit { background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        
        /* تنسيق الموبايل - تحويل الجدول لبطاقات */
        @media (max-width: 768px) {
            thead { display: none; }
            tbody, tr, td { display: block; width: 100%; }
            tr { background: #fff; margin-bottom: 15px; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-right: 5px solid var(--primary-color); }
            td { text-align: right; padding: 8px 0 !important; border: none !important; display: flex; justify-content: space-between; }
            td::before { content: attr(data-label); font-weight: bold; color: #555; }
        }
    </style>
</head>
<body>

    <div class="admin-container">
      <a href="admin.html" style="
    background: #1a365d; 
    color: #fff; 
    text-decoration: none; 
    padding: 10px 18px; 
    border-radius: 8px; 
    font-size: 14px; 
    display: inline-flex; 
    align-items: center; 
    gap: 8px; 
    transition: background 0.3s;">
    <i class="fas fa-arrow-right"></i> العودة للوحة التحكم
</a>

        <input type="text" id="table-search" placeholder="ابحث في المنتجات..." style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px;">

        <table id="products-table">
            <thead>
                <tr><th>SKU</th><th>الصورة</th><th>الاسم</th><th>البراند</th><th>السعر</th><th>الوصف</th><th>التحكم</th></tr>
            </thead>
            <tbody id="products-table-body">
                <tr><td colspan="7" style="text-align:center;">جاري الجلب...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
<script>
    // تعريف العميل بمتغير جديد لتجنب التعارض
    const client = window.supabase.createClient("https://aalpziidoobrqeppsvmi.supabase.co", "sb_publishable_Dzt7QBcxmcidwgZE3rkQcA_yoKmje1w");
    let allProducts = [];

    async function fetchProducts() {
        const tableBody = document.getElementById('products-table-body');
        const { data: products, error } = await client.from('inventory').select('*');
        
        if (error) { 
            tableBody.innerHTML = '<tr><td colspan="7" style="color:red; text-align:center;">خطأ في الاتصال</td></tr>'; 
            return; 
        }
        
        allProducts = products;
        let html = '';
        products.forEach(p => {
            html += `<tr>
                <td data-label="الرمز:">${p.sku}</td>
                <td data-label="الصورة:"><img src="${p.image_url || 'https://via.placeholder.com/50'}" width="40" height="40" style="border-radius:4px;"></td>
                <td data-label="الاسم:">${p.name}</td>
                <td data-label="البراند:">${p.brand || '-'}</td>
                <td data-label="السعر:">${Number(p.price).toLocaleString()} ل.س</td>
                <td data-label="الوصف:">${p.description ? p.description.substring(0, 20) : '-'}</td>
                <td data-label="التحكم:"><button class="btn-edit" onclick="openEditModal('${p.sku}')">تعديل</button></td>
            </tr>`;
        });
        tableBody.innerHTML = html;
    }

    function openEditModal(sku) {
        const p = allProducts.find(x => x.sku === sku);
        Swal.fire({
            title: 'تعديل',
            html: `<input id="name" value="${p.name}" style="width:100%; padding:10px; margin-bottom:10px;">
                   <input id="price" type="number" value="${p.price}" style="width:100%; padding:10px;">`,
            preConfirm: () => ({ name: document.getElementById('name').value, price: document.getElementById('price').value })
        }).then(res => {
            if (res.isConfirmed) {
                client.from('inventory').update(res.value).eq('sku', sku).then(fetchProducts);
            }
        });
    }

    document.getElementById('table-search').addEventListener('keyup', function() {
        let val = this.value.toLowerCase();
        document.querySelectorAll('tbody tr').forEach(row => {
            row.style.display = row.textContent.toLowerCase().includes(val) ? '' : 'none';
        });
    });

    fetchProducts();
</script>
</body>
</html>
