<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المنتجات | شركة أركان</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #1a365d; }
        body { font-family: 'Cairo', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .admin-container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #ddd; }
        th { background-color: #1a365d; color: white; }
        .btn-edit { background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }

        @media (max-width: 600px) { 
            .hide-on-mobile { display: none !important; } 
            h1 { font-size: 16px !important; }
            body { font-size: 12px !important; }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>إدارة المنتجات</h1>
            <a href="admin.html" style="background:#1a365d; color:#fff; padding:8px; border-radius:5px; text-decoration:none;"><i class="fas fa-arrow-right"></i> عودة</a>
        </div>
        <table>
            <thead>
                <tr><th>الاسم</th><th>البراند</th><th>السعر</th><th class="hide-on-mobile">الوصف</th><th>التحكم</th></tr>
            </thead>
            <tbody id="products-table-body"><tr><td colspan="6">جاري التحميل...</td></tr></tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const client = window.supabase.createClient("https://aalpziidoobrqeppsvmi.supabase.co", "sb_publishable_Dzt7QBcxmcidwgZE3rkQcA_yoKmje1w");
        
        async function fetchProducts() {
            const { data: products } = await client.from('inventory').select('*');
            let html = '';
            products.forEach(p => {
                html += `<tr>
                    <td><img src="${p.image_url||''}" width="30"></td>
                    <td>${p.name}</td>
                    <td>${p.brand||'-'}</td>
                    <td>${Number(p.price).toLocaleString()}</td>
                    <td class="hide-on-mobile">${p.description||'-'}</td>
                    <td><button class="btn-edit" onclick="openEditModal('${p.sku}', '${p.name}', ${p.price})">تعديل</button></td>
                </tr>`;
            });
            document.getElementById('products-table-body').innerHTML = html;
        }

        function openEditModal(sku, name, price) {
            Swal.fire({
                title: 'تعديل السعر',
                html: `<input id="new-price" type="number" value="${price}" class="swal2-input">`,
                confirmButtonText: 'حفظ',
                preConfirm: () => document.getElementById('new-price').value
            }).then((res) => {
                if (res.isConfirmed) {
                    client.from('inventory').update({ price: res.value }).eq('sku', sku).then(() => {
                        // رسالة تأكيد التعديل
                        Swal.fire('تم!', 'تم تحديث السعر بنجاح.', 'success');
                        fetchProducts();
                    });
                }
            });
        }
        fetchProducts();
    </script>
</body>
</html>
