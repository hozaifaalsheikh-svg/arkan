<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المنتجات | شركة أركان</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #1a365d; --secondary-color: #f27a1a; --bg-color: #f4f7f6; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; }
        .admin-container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        
        .btn-nav { background: #1a365d; color: #fff; text-decoration: none; padding: 10px 18px; border-radius: 8px; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #ddd; }
        th { background-color: #1a365d; color: white; }
        .btn-edit { background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }

        @media (max-width: 600px) { .hide-on-mobile { display: none !important; } }
        @media (max-width: 600px) {
         body { font-size: 10px !important; } /* تصغير الخط العام */
        table { font-size: 11px !important; } /* تصغير الخط داخل الجدول */
        th, td { padding: 6px 4px !important; } /* تقليل الفراغات ليناسب الخط الصغير */
       .btn-edit { font-size: 10px !important; padding: 4px 6px !important; } /* تصغير أزرار التعديل */
       .admin-header h1 {
        font-size: 12px !important; /* يمكنك تغيير الرقم حسب الحجم الذي تفضله */
    }
}
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>إدارة المنتجات</h1>
            <a href="admin.html" class="btn-nav"><i class="fas fa-arrow-right"></i> العودة للوحة التحكم</a>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>SKU</th><th>الاسم</th><th>السعر</th><th class="hide-on-mobile">الوصف</th><th>التحكم</th></tr>
                </thead>
                <tbody id="products-table-body"><tr><td colspan="5">جاري التحميل...</td></tr></tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const client = window.supabase.createClient("https://aalpziidoobrqeppsvmi.supabase.co", "sb_publishable_Dzt7QBcxmcidwgZE3rkQcA_yoKmje1w");
        async function fetchProducts() {
            const { data: products } = await client.from('inventory').select('*');
            let html = '';
            products.forEach(p => {
                html += `<tr><td>${p.sku}</td><td>${p.name}</td><td>${Number(p.price).toLocaleString()}</td><td class="hide-on-mobile">${p.description||'-'}</td><td><button class="btn-edit" onclick="alert('تعديل')">تعديل</button></td></tr>`;
            });
            document.getElementById('products-table-body').innerHTML = html;
        }
        fetchProducts();
    </script>
</body>
</html>
