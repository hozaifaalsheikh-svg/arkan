<script>
        const SUPABASE_URL = "https://aalpziidoobrqeppsvmi.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_Dzt7QBcxmcidwgZE3rkQcA_yoKmje1w"; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadProductDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (!productId) {
                document.getElementById('loading').innerHTML = "عذراً، لم يتم تحديد أي منتج.";
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .from('inventory')
                    .select('*')
                    .eq('sku', productId)
                    .single();

                if (error || !data) {
                    document.getElementById('loading').innerHTML = "المنتج غير موجود.";
                    return;
                }

                document.getElementById('loading').style.display = 'none';
                const contentDiv = document.getElementById('product-details-content');
                contentDiv.style.display = 'grid';

                // حل مشكلة الفواصل العلوية في الأسماء
                const safeName = data.name.replace(/'/g, "\\'");

                contentDiv.innerHTML = `
                    <div class="product-image-box"><img src="${data.image_url}" alt="${data.name}"></div>
                    <div class="product-info-box">
                        <span class="brand">قسم: ${data.category || 'متفرقات'}</span>
                        <h1>${data.name}</h1>
                        <div class="price">${data.price} ل.س</div>
                        <div class="full-description">${data.description || 'لا يوجد تفاصيل.'}</div>
                        <div style="display: flex; gap: 10px; margin-top: 20px; max-width: 350px;">
                            <button class="btn-add-to-cart" onclick="addToCartDirectly('${data.sku}', '${safeName}', ${data.price})" style="padding:15px; background:#f27a1a; color:white; border:none; cursor:pointer; font-weight:bold;">
                               <i class="fas fa-cart-plus"></i> إضافة للسلة
                            </button>
                            <button class="btn-add-to-cart" onclick="window.location.href='index.html'" style="padding:12px; background:#1a365d; color:white; border:none; cursor:pointer; font-weight:bold;">
                                العودة
                            </button>
                        </div>
                    </div>
                `;
            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerHTML = "حدث خطأ.";
            }
        }

        function addToCartDirectly(sku, name, price) {
            document.getElementById('modal-product-name').textContent = name;
            document.getElementById('modal-product-price').textContent = price + " ل.س";
            document.getElementById('confirm-modal').style.display = 'flex';

            // ربط زر التأكيد
            document.getElementById('confirm-btn').onclick = function() {
                let cart = JSON.parse(localStorage.getItem('arkan_cart')) || [];
                const existingItem = cart.find(item => String(item.sku) === String(sku));
                
                if (existingItem) {
                    existingItem.qty += 1;
                } else {
                    cart.push({ sku: sku, name: name, price: price, qty: 1 });
                }
                
                localStorage.setItem('arkan_cart', JSON.stringify(cart));
                document.getElementById('confirm-modal').style.display = 'none';
                alert("تمت الإضافة للسلة!");
            };
        }

        function closeModal() {
            document.getElementById('confirm-modal').style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', loadProductDetails);
    </script>
