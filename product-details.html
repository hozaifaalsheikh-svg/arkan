<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج | صيدلية أركان</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* التنسيق الاحترافي لصفحة التفاصيل */
        .details-container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        .product-view-card { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .img-wrapper img { width: 100%; border-radius: 8px; object-fit: contain; background: #fafafa; }
        .details-info h1 { color: #1a365d; margin-bottom: 15px; }
        .details-info .price { font-size: 28px; font-weight: 700; color: #f27a1a; margin: 20px 0; }
        
        .action-btns { display: flex; gap: 15px; margin-top: 30px; }
        .btn-ui { padding: 12px 25px; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; display: flex; align-items: center; gap: 8px; font-size: 14px; transition: 0.3s; }
        .btn-cart { background: #f27a1a; color: white; }
        .btn-cart
