<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج | صيدلية أركان</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .product-details-container { max-width: 1000px; margin: 40px auto; padding: 30px; background: white; border-radius: 12px; display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; }
        .product-image-box { display: flex; align-items: center; justify-content: center; }
        .product-image-box img { max-width: 100%; max-height: 450px; object-fit: contain; }
        .loading-text { text-align: center; padding: 100px 20px; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container"><div class="logo">Arkan<span>PHARMACY</span></div></div>
    </header>

    <main class="shop-container">
        <div id="loading" class="loading-text"><i class="fas fa-spinner fa-spin"></i> جاري جلب تفاصيل المنتج...</div>
        <div class="product-details-container" id="product-details-content" style="display: none;"></div>
    </main>

    <div id="confirm-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;">
        <div style="background: white; padding: 25px; border-radius: 15px; width: 320px; text-align: center;">
            <h3 style="color: #1a365d;">إضافة للمنتجات</h3>
            <p id="modal-product-name" style="font-weight: bold;"></p>
            <p id="modal-product-price" style="color: #f27a1a;"></p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="confirm-btn" style="flex:1; padding:10px; background:#25D366; color:white; border:none; border-radius:5px; cursor:pointer;">تأكيد</button>
                <button onclick="closeModal()" style="flex:1; padding:10px; background:#eee; border:none; border-radius:5px; cursor:pointer;">إلغاء</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script> 
    <script>
        const supabaseClient = window.supabase.createClient("https://aalpziidoobrqeppsvmi.supabase.co", "sb_publishable_Dzt7QBcxmcidwgZE3rkQcA_yoKmje1w");

        async function loadProductDetails() {
            const productId = new URLSearchParams(window.location.search).get('id');
            const { data } = await supabaseClient.from('inventory').select('*').eq('sku', productId).single();
            
            if (data) {
                document.getElementById('loading').style.display = 'none';
                const contentDiv = document.getElementById('product-details-content');
                contentDiv.style.display = 'grid';
                contentDiv.innerHTML = `
                    <div class="product-image-box"><img src="${data.image_url}" alt="${data.name}"></div>
                    <div class="product-info-box">
                        <h1>${data.name}</h1>
                        <div class="price">${data.price} ل.س</div>
                        <button class="btn-add-to-cart" onclick="prepareAddToCart('${data.sku}')" style="padding:15px; background:#f27a1a; color:white; border:none; cursor:pointer;">إضافة للسلة</button>
                    </div>
                `;
            }
        }
        document.addEventListener('DOMContentLoaded', loadProductDetails);
        function closeModal() { document.getElementById('confirm-modal').style.display = 'none'; }
    </script>
</body>
</html>
