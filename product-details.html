<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج | صيدلية أركان</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* تنسيقات إضافية لصفحة التفاصيل */
        .details-wrapper { max-width: 1000px; margin: 40px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .img-box img { width: 100%; border-radius: 8px; object-fit: contain; }
        .info-box h1 { color: #1a365d; margin-bottom: 10px; }
        .info-box .price { font-size: 28px; font-weight: bold; color: #f27a1a; margin: 20px 0; }
        .btn-group { display: flex; gap: 10px; }
        .btn-add { background: #f27a1a; color: white; border: none; padding: 15px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        .btn-add:hover { background: #e06912; }
        .btn-back { background: #1a365d; color: white; border: none; padding: 15px 30px; border-radius: 6px; cursor: pointer; text-decoration: none; text-align: center; transition: background 0.3s;}
        .btn-back:hover { background: #112440; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <a href="index.html" style="text-decoration: none;">
                <div class="logo">Arkan<span>PHARMACY</span></div>
            </a>
        </div>
    </header>

    <main class="details-wrapper">
        <div id="product-content" class="product-grid">
            <p style="text-align: center; width: 100%; grid-column: span 2;">جاري تحميل التفاصيل...</p>
        </div>
    </main>

    <!-- نافذة التأكيد الاحترافية الجديدة -->
    <div id="custom-confirm-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-icon"><i class="fas fa-shopping-basket"></i></div>
            <h3>تأكيد الإضافة</h3>
            <p>هل أنت متأكد من إضافة <br><strong id="modal-target-product" style="color: var(--primary-color);"></strong><br> إلى السلة؟</p>
            <div class="modal-actions">
                <button id="modal-btn-confirm" class="btn-confirm">نعم، أضف للسلة</button>
                <button id="modal-btn-cancel" class="btn-cancel" onclick="closeConfirmModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- حاوية الإشعارات -->
    <div id="toast-container"></div>

    <!-- استدعاء المكتبات والملف الرئيسي -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    
    <!-- كود جلب تفاصيل المنتج الخاص بهذه الصفحة فقط -->
    <script>
        async function loadProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            const sku = urlParams.get('id');
            if (!sku) return;

            // نستخدم supabaseClient المُعرف مسبقاً في ملف script.js
            const { data, error } = await supabaseClient.from('inventory').select('*').eq('sku', sku).single();
            
            if (error || !data) {
                document.getElementById('product-content').innerHTML = "<p style='text-align:center; grid-column: span 2; padding: 30px;'>عذراً، المنتج غير موجود.</p>";
                return;
            }

            // عرض المنتج وربط زر الإضافة بدالة الإشعارات الجديدة (askToConfirmAdd)
            document.getElementById('product-content').innerHTML = `
                <div class="img-box">
                    <img src="${data.image_url || 'https://via.placeholder.com/400'}" alt="${data.name}">
                </div>
                <div class="info-box">
                    <h1>${data.name}</h1>
                    <p>${data.description || 'لا يوجد وصف حالياً.'}</p>
                    <div class="price">${data.price} ل.س</div>
                    <div class="btn-group">
                        <button class="btn-add" onclick="askToConfirmAdd('${data.sku}', '${data.name}', ${data.price})">إضافة للسلة</button>
                        <a href="index.html" class="btn-back">العودة للمتجر</a>
                    </div>
                </div>
            `;
        }

        // تشغيل الدالة عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', loadProduct);
    </script>
</body>
</html>
