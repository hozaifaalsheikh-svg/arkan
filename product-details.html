<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج | شركة أركان</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* الحاوية الرئيسية للمنتج */
        .details-wrapper { 
            max-width: 1000px; 
            margin: 50px auto; 
            padding: 40px; 
            background: #ffffff; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); 
        }
        
        .product-grid { 
            display: grid; 
            grid-template-columns: 1fr 1.2fr; /* إعطاء مساحة أوسع للنصوص */
            gap: 50px; 
            align-items: center; 
        }
        
        /* صندوق الصورة */
        .img-box { 
            position: relative; 
            background: #f8f9fa; /* خلفية رمادية فاتحة جداً تبرز المنتج */
            border-radius: 16px; 
            padding: 40px 20px; 
            text-align: center; 
            border: 1px solid #f1f1f1;
        }
        .img-box img { 
            max-width: 100%; 
            max-height: 400px; /* منع الصورة من التمدد المبالغ فيه */
            object-fit: contain; 
            transition: transform 0.3s ease;
        }
        .img-box:hover img {
            transform: scale(1.05); /* تأثير زووم خفيف عند تمرير الماوس */
        }
        
        /* شارة ARKAN */
        .arkan-tag { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: #1a365d; 
            color: white; 
            font-weight: 800; 
            font-size: 13px; 
            padding: 6px 14px; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(26,54,93,0.2); 
            letter-spacing: 1px; 
        }
        
        /* صندوق النصوص */
        .info-box { 
            text-align: right; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        /* شارة البراند (الماركة) */
        .brand-badge { 
            align-self: flex-start; /* لمنعها من التمدد على كامل العرض */
            background: #fdf3eb; 
            color: #555; 
            padding: 6px 18px; 
            border-radius: 30px; 
            font-size: 14px; 
            margin-bottom: 20px; 
            border: 1px solid #fce3d0; 
        }
        .brand-badge strong { color: #f27a1a; font-weight: 800; }
        
        .info-box h1 { 
            color: #1a365d; 
            margin: 0 0 15px 0; 
            font-size: 38px; 
            font-weight: 800;
        }
        
        .info-box p {
            font-size: 18px;
            color: #666;
            line-height: 1.7;
            margin-bottom: 30px;
        }
        
        /* السعر */
        .info-box .price { 
            font-size: 36px; 
            font-weight: 900; 
            color: #f27a1a; 
            margin: 0 0 35px 0; 
            display: inline-block;
            background: #fafafa;
            padding: 10px 25px;
            border-radius: 12px;
            border: 1px dashed #ddd;
        }
        
        /* الأزرار */
        .btn-group { 
            display: flex; 
            gap: 15px; 
        }
        .btn-add, .btn-back { 
            flex: 1; 
            padding: 16px 20px; 
            border-radius: 10px; 
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
        }
        
        .btn-add { 
            background: #f27a1a; 
            color: white; 
            border: none; 
            box-shadow: 0 6px 15px rgba(242, 122, 26, 0.3); /* ظل يعطي الزر بروزاً */
        }
        .btn-add:hover { 
            background: #e06912; 
            transform: translateY(-3px); 
        }
        
        .btn-back { 
            background: #ffffff; 
            color: #1a365d; 
            border: 2px solid #1a365d; 
        }
        .btn-back:hover { 
            background: #f4f7f6; 
            transform: translateY(-3px); 
        }

        /* تجاوب الشاشات الصغيرة (الموبايل) */
        @media (max-width: 768px) {
            .product-grid { grid-template-columns: 1fr; gap: 30px; }
            .info-box { text-align: center; align-items: center; }
            .brand-badge { align-self: center; }
            .btn-group { flex-direction: column; width: 100%; }
            .btn-add, .btn-back { width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <a href="index.html" style="text-decoration: none;">
                <div class="logo">Arkan<span>PHARMACY</span></div>
            </a>
        </div>
    </header>

    <main class="details-wrapper">
        <div id="product-content" class="product-grid">
            <p style="text-align: center; width: 100%; grid-column: span 2;">جاري تحميل التفاصيل...</p>
        </div>
    </main>

    <div id="custom-confirm-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-icon"><i class="fas fa-shopping-basket"></i></div>
            <h3>تأكيد الإضافة</h3>
            <p>هل أنت متأكد من إضافة <br><strong id="modal-target-product" style="color: var(--primary-color);"></strong><br> إلى السلة؟</p>
            <div class="modal-actions">
                <button id="modal-btn-confirm" class="btn-confirm">نعم، أضف للسلة</button>
                <button id="modal-btn-cancel" class="btn-cancel" onclick="closeConfirmModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    
    <script>
        async function loadProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            const sku = urlParams.get('id');
            if (!sku) return;

            // نستخدم supabaseClient المُعرف مسبقاً في ملف script.js
            const { data, error } = await supabaseClient.from('inventory').select('*').eq('sku', sku).single();
            
            if (error || !data) {
                document.getElementById('product-content').innerHTML = "<p style='text-align:center; grid-column: span 2; padding: 30px;'>عذراً، المنتج غير موجود.</p>";
                return;
            }

            // عرض المنتج وربط زر الإضافة بدالة الإشعارات الجديدة مع عرض البراند وتنسيق السعر ديناميكياً
            document.getElementById('product-content').innerHTML = `
                <div class="img-box">
                    <div class="arkan-tag">ARKAN</div>
                    <img src="${data.image_url || 'https://via.placeholder.com/400'}" alt="${data.name}">
                </div>
                <div class="info-box">
                    <div class="brand-badge">العلامة التجارية: <strong>${data.brand || 'عام'}</strong></div>
                    <h1>${data.name}</h1>
                    <p>${data.description || 'لا يوجد وصف حالياً.'}</p>
                    <div class="price">${Number(data.price).toLocaleString()} ل.س</div>
                    <div class="btn-group">
                        <button class="btn-add" onclick="askToConfirmAdd('${data.sku}', '${data.name}', ${data.price})">إضافة للسلة</button>
                        <a href="index.html" class="btn-back">العودة للمتجر</a>
                    </div>
                </div>
            `;
        }

        // تشغيل الدالة عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', loadProduct);
    </script>
    <a href="cart.html" class="floating-cart-btn">
        <i class="fas fa-shopping-cart"></i>
        <span class="floating-cart-count" id="cart-counter-badge">0</span>
    </a>
</body>
</html>
