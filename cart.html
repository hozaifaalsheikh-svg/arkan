<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة التسوق | شركة أركان</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #1a365d; --secondary-color: #f27a1a; --border-color: #ccc; }
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; padding: 20px; margin: 0; }
        .cart-page-container { max-width: 900px; margin: 40px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .cart-page-title { text-align: center; color: var(--secondary-color); margin-bottom: 30px; font-size: 28px; }
        .cart-item-row { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; gap: 15px; }
        .cart-item-info { flex: 2; font-size: 16px; font-weight: 600; }
        .cart-item-price { flex: 1; color: var(--primary-color); font-weight: bold; text-align: center; }
        .qty-controls { flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .qty-controls button { background: #eee; border: none; width: 35px; height: 35px; border-radius: 6px; cursor: pointer; }
        .delete-btn { background: #fff0f0 !important; color: #dc3545 !important; }
        .cart-summary { background: #fdfdfd; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-top: 20px; }
        .btn-whatsapp { background: var(--secondary-color); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; }
        @media (max-width: 768px) { .cart-item-row { flex-direction: column; } }
    </style>
</head>
<body>

    <main class="cart-page-container">
        <h1 class="cart-page-title"><i class="fas fa-shopping-cart"></i> سلة مشترياتي</h1>
        <div id="cart-content"></div>
        
        <div class="cart-summary" id="cart-summary" style="display: none;">
            <div style="font-size: 22px; font-weight: bold; display: flex; justify-content: space-between;">
                <span>الإجمالي:</span>
                <span id="final-total" style="color: var(--primary-color);">0 ل.س</span>
            </div>
            <hr>
            <div style="display: grid; gap: 10px; margin-top: 20px;">
                <input type="text" id="cust-name" placeholder="اسمك الكريم" style="padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
                <input type="tel" id="cust-phone" placeholder="رقم الموبايل" style="padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
                <input type="text" id="cust-address" placeholder="العنوان" style="padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
                <button class="btn-whatsapp" onclick="submitOrder()">تأكيد وإرسال الطلب</button>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // إعداد آمن
        document.addEventListener('DOMContentLoaded', () => {
            renderCartPage();
        });

        let cart = JSON.parse(localStorage.getItem('arkan_cart')) || [];

        function renderCartPage() {
            const contentDiv = document.getElementById('cart-content');
            const summaryDiv = document.getElementById('cart-summary');
            
            if (!contentDiv) return; // الحماية من الخطأ الذي ظهر لك

            if (cart.length === 0) {
                contentDiv.innerHTML = '<div style="text-align:center; padding: 50px;">سلتك فارغة حالياً.</div>';
                if(summaryDiv) summaryDiv.style.display = 'none';
                return;
            }

            let html = '<div class="cart-list">';
            let total = 0;

            cart.forEach(item => {
                const price = parseInt(item.price) || 0;
                total += price * item.qty;
                html += `
                    <div class="cart-item-row">
                        <div class="cart-item-info">${item.name}</div>
                        <div class="cart-item-price">${(price * item.qty).toLocaleString()} ل.س</div>
                        <div class="qty-controls">
                            <button onclick="changeQty('${item.sku}', 1)">+</button>
                            <span style="font-weight:bold;">${item.qty}</span>
                            <button onclick="changeQty('${item.sku}', -1)">-</button>
                            <button class="delete-btn" onclick="removeItem('${item.sku}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
            html += '</div>';

            contentDiv.innerHTML = html;
            if(summaryDiv) {
                summaryDiv.style.display = 'block';
                document.getElementById('final-total').textContent = `${total.toLocaleString()} ل.س`;
            }
        }

        function changeQty(sku, delta) {
            const item = cart.find(i => i.sku === sku);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) cart = cart.filter(i => i.sku !== sku);
                localStorage.setItem('arkan_cart', JSON.stringify(cart));
                renderCartPage();
            }
        }

        function removeItem(sku) {
            cart = cart.filter(i => i.sku !== sku);
            localStorage.setItem('arkan_cart', JSON.stringify(cart));
            renderCartPage();
        }

        async function submitOrder() {
            // ... (نفس دالة submitOrder السابقة)
            Swal.fire({ icon: 'success', title: 'تمت العملية بنجاح!' });
        }
    </script>
</body>
</html>
