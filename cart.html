<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سلة التسوق | شركة أركان</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; padding: 20px; }
        .cart-page-container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; }
        .cart-item-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-whatsapp { background: #25D366; color: white; border: none; padding: 15px; width: 100%; cursor: pointer; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

<main class="cart-page-container">
    <h1>سلة المشتريات</h1>
    <div id="cart-content"></div>
    <div id="cart-summary" style="display: none;">
        <h3 id="final-total">الإجمالي: 0 ل.س</h3>
        <button onclick="clearCart()" style="background:red; color:white; border:none; padding:10px; cursor:pointer;">تفريغ السلة</button>
        <div style="margin-top:20px;">
            <input type="text" id="cust-name" placeholder="الاسم">
            <input type="tel" id="cust-phone" placeholder="رقم الموبايل">
            <input type="text" id="cust-city" placeholder="المدينة">
            <input type="text" id="cust-address" placeholder="العنوان">
            <button class="btn-whatsapp" onclick="submitOrder()">إرسال الطلب</button>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

<script>
    // هذه الدوال خاصة بصفحة السلة فقط
    function renderCartPage() {
        const contentDiv = document.getElementById('cart-content');
        const summaryDiv = document.getElementById('cart-summary');
        if (!contentDiv) return;

        let cart = JSON.parse(localStorage.getItem('arkan_cart')) || [];
        if (cart.length === 0) {
            contentDiv.innerHTML = '<p>السلة فارغة</p>';
            if(summaryDiv) summaryDiv.style.display = 'none';
            return;
        }

        let html = '';
        let total = 0;
        cart.forEach(item => {
            total += (item.price * item.qty);
            html += `<div class="cart-item-row"><div>${item.name} (${item.qty})</div><div>${item.price * item.qty}</div></div>`;
        });
        
        contentDiv.innerHTML = html;
        document.getElementById('final-total').textContent = "الإجمالي: " + total + " ل.س";
        summaryDiv.style.display = 'block';
    }

    function clearCart() {
        localStorage.removeItem('arkan_cart');
        renderCartPage();
        updateCartCount();
    }

    async function submitOrder() {
        const cart = JSON.parse(localStorage.getItem('arkan_cart')) || [];
        const name = document.getElementById('cust-name').value;
        // (قم بإكمال باقي الحقول هنا)
        
        const { error } = await supabaseClient.from('orders').insert([{
            customer_name: name,
            order_details: cart,
            total_amount: document.getElementById('final-total').textContent
        }]);

        if (error) { Swal.fire('خطأ', error.message, 'error'); } 
        else { Swal.fire('تم!', 'تم إرسال الطلب', 'success'); }
    }

    document.addEventListener('DOMContentLoaded', renderCartPage);
</script>
</body>
</html>
