<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة التسوق | شركة أركان</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS كما هو، لا تغيير */
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; padding: 20px; margin: 0; }
        .cart-page-container { max-width: 900px; margin: 40px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .cart-item-row { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; }
        .btn-whatsapp { background: #f27a1a; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <main class="cart-page-container">
        <h1>سلة مشترياتي</h1>
        <div id="cart-content"></div>
        <div id="cart-summary" style="display: none;">
            <p>الإجمالي: <span id="final-total">0</span> ل.س</p>
            <input type="text" id="cust-name" placeholder="الاسم">
            <input type="tel" id="cust-phone" placeholder="الهاتف">
            <button class="btn-whatsapp" onclick="submitOrder()">تأكيد الطلب</button>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // المتغير العام
        let cart = JSON.parse(localStorage.getItem('arkan_cart')) || [];

        // تأمين: السكربت لن يعمل إلا بعد تحميل كل عناصر الـ HTML
        document.addEventListener('DOMContentLoaded', () => {
            renderCartPage();
        });

        function renderCartPage() {
            const contentDiv = document.getElementById('cart-content');
            const summaryDiv = document.getElementById('cart-summary');
            
            // تحقق: إذا لم يجد الصفحة العناصر، توقف عن التنفيذ
            if (!contentDiv) return; 

            if (cart.length === 0) {
                contentDiv.innerHTML = '<p>سلتك فارغة.</p>';
                if(summaryDiv) summaryDiv.style.display = 'none';
                return;
            }

            let html = '<div class="cart-list">';
            let total = 0;

            cart.forEach(item => {
                const p = parseInt(item.price) || 0;
                total += p * item.qty;
                html += `
                    <div class="cart-item-row">
                        <div>${item.name}</div>
                        <div>${p * item.qty} ل.س</div>
                        <div>
                            <button onclick="changeQty('${item.sku}', 1)">+</button>
                            <span>${item.qty}</span>
                            <button onclick="changeQty('${item.sku}', -1)">-</button>
                        </div>
                    </div>
                `;
            });
            html += '</div>';

            contentDiv.innerHTML = html;
            if(summaryDiv) {
                summaryDiv.style.display = 'block';
                document.getElementById('final-total').textContent = total;
            }
        }

        function changeQty(sku, delta) {
            const item = cart.find(i => i.sku === sku);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) cart = cart.filter(i => i.sku !== sku);
                localStorage.setItem('arkan_cart', JSON.stringify(cart));
                renderCartPage(); // إعادة الرسم
            }
        }

        async function submitOrder() {
            // منطق الإرسال ثابت
            Swal.fire({ icon: 'success', title: 'تم الطلب!' });
        }
    </script>
</body>
</html>
