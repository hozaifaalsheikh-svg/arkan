<script>
        // تعريف المتغير العام في أعلى السكربت لضمان رؤيته من كل الدوال
        let cart = JSON.parse(localStorage.getItem('arkan_cart')) || [];

        function renderCartPage() {
            const contentDiv = document.getElementById('cart-content');
            const summaryDiv = document.getElementById('cart-summary');
            
            if (cart.length === 0) {
                contentDiv.innerHTML = '<div class="empty-msg"><i class="fas fa-box-open" style="font-size: 40px; margin-bottom: 15px; display:block;"></i>سلتك فارغة حالياً.</div>';
                summaryDiv.style.display = 'none';
                return;
            }

            let html = '<div class="cart-list">';
            let total = 0;

            cart.forEach(item => {
                const itemPrice = parseInt(item.price) || 0;
                const qty = parseInt(item.qty) || 1;
                total += itemPrice * qty;

                html += `
                    <div class="cart-item-row">
                        <div class="cart-item-info">${item.name}</div>
                        <div class="cart-item-price">${(itemPrice * qty).toLocaleString()} ل.س</div>
                        <div class="qty-controls">
                            <button onclick="changePageQty('${item.sku}', 1)">+</button>
                            <span style="font-size: 18px; min-width: 30px; text-align: center; font-weight:bold;">${qty}</span>
                            <button onclick="changePageQty('${item.sku}', -1)">-</button>
                            <button class="delete-btn" onclick="removePageItem('${item.sku}')"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                `;
            });
            html += '</div>';

            contentDiv.innerHTML = html;
            document.getElementById('final-total').textContent = `${total.toLocaleString()} ل.س`;
            summaryDiv.style.display = 'block';
        }

        function changePageQty(sku, delta) {
            // البحث عن المنتج في المصفوفة العامة
            const item = cart.find(i => i.sku === sku);
            if (!item) return;

            // تحديث الكمية والتأكد أنها رقم
            item.qty = parseInt(item.qty) + delta;
            
            if (item.qty <= 0) {
                cart = cart.filter(i => i.sku !== sku);
            }
            
            // حفظ التحديث
            localStorage.setItem('arkan_cart', JSON.stringify(cart));
            
            // إعادة الرسم فوراً
            renderCartPage();
        }

        function removePageItem(sku) {
            cart = cart.filter(i => i.sku !== sku);
            localStorage.setItem('arkan_cart', JSON.stringify(cart));
            renderCartPage();
        }

        // باقي دوال الإرسال (submitOrder) تبقى كما هي...
        // ... (تأكد أن الدوال الأخرى موجودة بنفس الأسماء)
        
        document.addEventListener('DOMContentLoaded', renderCartPage);
    </script>ٍ
