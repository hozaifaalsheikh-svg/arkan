<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkan COMPANY | شركة أركان</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body> 
    <div id="admin-login-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f7f6; z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column;">
        <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 350px; width: 90%;">
            <h2 style="color: var(--primary-color); margin-top: 0;"><i class="fas fa-lock"></i> منطقة الإدارة المحمية</h2>
            <p style="color: #666; font-size: 14px;">الرجاء إدخال كلمة المرور للمتابعة</p>
            <input type="password" id="admin-pass" placeholder="كلمة المرور..." style="width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 6px; text-align: center; box-sizing: border-box; outline: none;">
            <button onclick="checkAdminPassword()" style="width: 100%; padding: 12px; background: var(--secondary-color); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px;">تسجيل الدخول</button>
        </div>
    </div>
    <div class="sticky-wrapper">
        <header class="main-header">
            <div class="header-container">
                
                <div class="brand-group">
                    <a href="index.html" style="text-decoration: none;">
                        <div class="logo">Arkan<span>COMPANY</span></div>
                    </a>
                    
                <div class="header-links">
                       <a href="about.html"><i class="fas fa-info-circle" style="margin-left: 5px;"></i> حول الشركة</a>
                       <a href="register.html"><i class="fas fa-user-plus" style="margin-left: 5px;"></i> تسجيل الدخول</a>
                </div>
                </div>

                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="ابحث عن متمم غذائي..كريمات.. سيرومات...">
                    <button><i class="fas fa-search"></i></button>
                </div>
                
                <div class="header-actions">
                    <a href="cart.html" class="cart-icon-wrapper" style="text-decoration: none; color: inherit;">
                        <i class="fas fa-shopping-bag"></i>
                        <span id="cart-count">0</span>
                        <span class="cart-text">سلتـي</span>
                    </a>
                </div>

            </div>
        </header>

        <nav class="categories-nav">
            <button class="cat-btn active" onclick="filterCategory('الكل', this)">الكل</button>
            <button class="cat-btn" onclick="filterCategory('واقيات شمس', this)">واقيات شمس</button>
            <button class="cat-btn" onclick="filterCategory('عناية بالبشرة', this)">عناية بالبشرة</button>
            <button class="cat-btn" onclick="filterCategory('عناية بالشعر', this)">عناية بالشعر</button>
            <button class="cat-btn" onclick="filterCategory('مكملات غذائية', this)">متممات غذائية</button>
            <button class="cat-btn" onclick="filterCategory('فيتامينات', this)">فيتامينات</button>
        </nav>
    </div>
    <main class="shop-container">
        <div class="products-grid" id="products-grid"></div>
    </main>

    <div id="custom-confirm-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-icon"><i class="fas fa-shopping-basket"></i></div>
            <h3>تأكيد الإضافة</h3>
            <p>هل أنت متأكد من إضافة <br><strong id="modal-target-product" style="color: var(--primary-color);"></strong><br> إلى السلة؟</p>
            <div class="modal-actions">
                <button id="modal-btn-confirm" class="btn-confirm">نعم، أضف للسلة</button>
                <button id="modal-btn-cancel" class="btn-cancel" onclick="closeConfirmModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <div style="text-align: center; padding: 20px; background: #fdfdfd; border-top: 1px solid #eee;">
        <a href="admin.html" style="color: #ccc; text-decoration: none; font-size: 12px;">
            <i class="fas fa-lock"></i> الإدارة
        </a>
    </div>
</body>

</html>
