<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkan COMPANY | شركة أركان</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body> 
    </div>
    <div class="sticky-wrapper">
        <header class="main-header">
            <div class="header-container">
                
                <div class="brand-group">
                    <a href="index.html" style="text-decoration: none;">
                        <div class="logo">Arkan<span>COMPANY</span></div>
                    </a>
                    
                    <div class="header-links">
                        <a href="about.html" class="mobile-about-btn"><i class="fas fa-info-circle" style="margin-left: 5px;"></i> حول</a>
                        <a href="register.html"><i class="fas fa-user-plus" style="margin-left: 5px;"></i> <span class="desktop-only-text">تسجيل الدخول</span><span class="mobile-only-text">حسابي</span></a>
                    </div>
                </div>

                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="ابحث عن متمم غذائي..">
                    <button><i class="fas fa-search"></i></button>
                </div>
                
                <div class="header-actions desktop-about-btn">
                    <a href="login.html" class="header-action-btn" style="text-decoration: none; margin-left: 10px;">
                        <i class="fas fa-user"></i> <span>الحساب</span>
                    </a>
                    <a href="about.html" class="header-action-btn" style="text-decoration: none;">
                        <i class="fas fa-info-circle"></i> <span>حول الشركة</span>
                    </a>
                </div>

            </div>
        </header>

        <nav class="categories-nav">
            <button class="cat-btn active" onclick="filterCategory('الكل', this)">الكل</button>
            <button class="cat-btn" onclick="filterCategory('واقيات شمس', this)">واقيات شمس</button>
            <button class="cat-btn" onclick="filterCategory('عناية بالبشرة', this)">عناية بالبشرة</button>
            <button class="cat-btn" onclick="filterCategory('عناية بالشعر', this)">عناية بالشعر</button>
            <button class="cat-btn" onclick="filterCategory('مكملات غذائية', this)">متممات غذائية</button>
            <button class="cat-btn" onclick="filterCategory('فيتامينات', this)">فيتامينات</button>
        </nav>
    </div>
    <main class="shop-container">
        <div class="products-grid" id="products-grid"></div>
    </main>

    <div id="custom-confirm-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-icon"><i class="fas fa-shopping-basket"></i></div>
            <h3>تأكيد الإضافة</h3>
            <p>هل أنت متأكد من إضافة <br><strong id="modal-target-product" style="color: var(--primary-color);"></strong><br> إلى السلة؟</p>
            <div class="modal-actions">
                <button id="modal-btn-confirm" class="btn-confirm">نعم، أضف للسلة</button>
                <button id="modal-btn-cancel" class="btn-cancel" onclick="closeConfirmModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <div style="text-align: center; padding: 20px; background: #fdfdfd; border-top: 1px solid #eee;">
        <a href="admin.html" style="color: #ccc; text-decoration: none; font-size: 12px;">
            <i class="fas fa-lock"></i> الإدارة
        </a>
    </div>
    <a href="cart.html" class="floating-cart-btn">
        <i class="fas fa-shopping-cart"></i>
        <span class="floating-cart-count" id="cart-counter-badge">0</span>
    </a>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
