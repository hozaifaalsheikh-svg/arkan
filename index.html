<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkan COMPANY | شركة أركان</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&amp;display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body> 
    
    <div class="sticky-wrapper">
        <header class="main-header">
            <div class="header-container">
                
                <div class="brand-group">
                    <a href="index.html" style="text-decoration: none;">
                        <div class="logo">Arkan<span>COMPANY</span></div>
                    </a>
                </div>

                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="ابحث عن مكملات غذائية.. كريمات تبييض.. سيرومات">
                    <button><i class="fas fa-search"></i></button>
                </div>
                
                <div class="header-actions" style="display: flex; align-items: center; gap: 10px;">
                    <a href="about.html" class="header-action-btn" style="text-decoration: none;">
                        <i class="fas fa-info-circle"></i> 
                        <span class="hide-on-mobile">حول الشركة</span>
                        <span class="mobile-only-text">حول</span>
                    </a>

                    <div class="header-links" id="auth-container" style="display: flex; align-items: center;"></div>
                </div>

            </div>
        </header>

        <nav class="categories-nav">
            <button class="cat-btn active" onclick="filterCategory('الكل', this)">الكل</button>
            <button class="cat-btn" onclick="filterCategory('واقيات شمس', this)">واقيات شمس</button>
            <button class="cat-btn" onclick="filterCategory('عناية بالبشرة', this)">عناية بالبشرة</button>
            <button class="cat-btn" onclick="filterCategory('عناية بالشعر', this)">عناية بالشعر</button>
            <button class="cat-btn" onclick="filterCategory('مكملات غذائية', this)">متممات غذائية</button>
            <button class="cat-btn" onclick="filterCategory('فيتامينات', this)">فيتامينات</button>
        </nav>
    </div>

    <main class="shop-container">
        <div class="products-grid" id="products-grid"></div>
    </main>

    <div id="custom-confirm-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-icon"><i class="fas fa-shopping-basket"></i></div>
            <h3>تأكيد الإضافة</h3>
            <p>هل أنت متأكد من إضافة <br><strong id="modal-target-product" style="color: var(--primary-color);"></strong><br> إلى السلة؟</p>
            <div class="modal-actions">
                <button id="modal-btn-confirm" class="btn-confirm">نعم، أضف للسلة</button>
                <button id="modal-btn-cancel" class="btn-cancel" onclick="closeConfirmModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    
    <a href="cart.html" class="floating-cart-btn">
        <i class="fas fa-shopping-cart"></i>
        <span class="floating-cart-count" id="cart-counter-badge">0</span>
    </a>

    <footer style="text-align: center; padding: 25px; background: #fdfdfd; border-top: 1px solid #eee; display: flex; flex-direction: column; gap: 8px; align-items: center;">
        <a href="https://www.facebook.com/share/1EFg5oq7Hz/" target="_blank" style="text-decoration: none; color: #777; font-size: 13px; transition: 0.3s;" onmouseover="this.style.color='#1a365d'" onmouseout="this.style.color='#777'">
            Designed & Developed by <span style="font-weight: 700; color: #1a365d;">Eng. HUDHAYFA AL-SHEIKH</span>
            <i class="fab fa-facebook" style="margin-right: 8px; color: #1877f2;"></i>
        </a>
        <a href="admin.html" style="color: #bbb; text-decoration: none; font-size: 11px; transition: 0.3s;" onmouseover="this.style.color='#777'" onmouseout="this.style.color='#bbb'">لوحة التحكم</a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script>
        const SUPABASE_URL = "https://aalpziidoobrqeppsvmi.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_Dzt7QBcxmcidwgZE3rkQcA_yoKmje1w"; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let localProducts = [];
        let cart = JSON.parse(localStorage.getItem('arkan_cart')) || [];
        let productToConfirm = null; 
        let currentSypRate = 14000; 

        // 1. جلب سعر الصرف
        async function fetchExchangeRate() {
            try {
                const { data, error } = await supabaseClient.from('app_settings').select('current_syp_rate').eq('id', 1).single();
                if (error) throw error;
                if (data && data.current_syp_rate) {
                    currentSypRate = data.current_syp_rate;
                    console.log("تم جلب سعر الصرف بنجاح:", currentSypRate);
                }
            } catch (err) {
                console.error("فشل جلب سعر الصرف:", err);
            }
        }

        // 2. جلب المنتجات وحساب الأسعار
        async function loadProductsFromSupabase() {
            try {
                const { data, error } = await supabaseClient.from('inventory').select('*');
                if (error) { console.error("خطأ:", error); return; }

                localProducts = data.map(product => {
                    const priceInUSD = Number(product.price) || 0;
                    const priceInSYP = Math.round(priceInUSD * currentSypRate); 

                    return {
                        sku: product.sku,
                        name: product.name,
                        description: product.description || "منتج أركان فارما المميز.",
                        priceUSD: priceInUSD,
                        priceSYP: priceInSYP,
                        category: product.category || "عام",
                        brand: product.brand || "Bioxcin", 
                        imageUrl: product.image_url 
                    };
                });
                renderProducts(localProducts); 
            } catch (err) { console.error("فشل الاتصال:", err); }
        }

        // 3. تهيئة الصفحة عند التحميل
        document.addEventListener('DOMContentLoaded', async () => {
            await fetchExchangeRate();
            const grid = document.getElementById('products-grid');
            if (grid) { await loadProductsFromSupabase(); }
            updateCartCount();

            const confirmBtn = document.getElementById('modal-btn-confirm');
            if(confirmBtn) {
                confirmBtn.addEventListener('click', confirmAddToCart);
            }
        });

        // 4. عرض المنتجات
        function renderProducts(productsList) {
            const grid = document.getElementById('products-grid');
            if(!grid) return; 
            grid.innerHTML = '';
            
            productsList.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => { window.location.href = `product-details.html?id=${product.sku}`; };
                
                let descText = product.description || "منتج أركان فارما المميز.";
                let readMoreHtml = descText.length > 60 ? '<span class="read-more">اقرأ المزيد</span>' : '';

                const formattedPriceSYP = product.priceSYP.toLocaleString('ar-SY');

                card.innerHTML = `
                    <div class="image-container"><img src="${product.imageUrl || 'https://via.placeholder.com/200'}" alt="${product.name}"></div>
                    <div class="product-info">
                        <span class="product-brand">${product.brand}</span>
                        <h4 class="product-title">${product.name}</h4>
                        <div class="desc-wrapper"><p class="product-description">${descText}</p>${readMoreHtml}</div>
                        <div class="price-row">${formattedPriceSYP} ل.س</div>
                        <button type="button" class="btn-add-to-cart" onclick="event.stopPropagation(); askToConfirmAdd('${product.sku}', '${product.name.replace(/'/g, "\\'")}', ${product.priceSYP})">إضافة إلى السلة</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 5. دوال نافذة السلة
        function askToConfirmAdd(sku, name, price) {
            productToConfirm = { sku, name, price };
            const nameElement = document.getElementById('modal-target-product');
            const modalElement = document.getElementById('custom-confirm-modal');
            
            if(nameElement && modalElement) {
                nameElement.textContent = name;
                modalElement.classList.add('active');
            }
        }

        function closeConfirmModal() {
            const modalElement = document.getElementById('custom-confirm-modal');
            if(modalElement) {
                modalElement.classList.remove('active');
            }
            productToConfirm = null; 
        }

        function confirmAddToCart() {
            if (!productToConfirm) return;

            const existingItem = cart.find(item => String(item.sku) === String(productToConfirm.sku));
            if (existingItem) { 
                existingItem.qty += 1; 
            } else { 
                cart.push({ ...productToConfirm, qty: 1 }); 
            }
            
            localStorage.setItem('arkan_cart', JSON.stringify(cart));
            updateCartCount(); 
            closeConfirmModal(); 
            showToast("تمت الإضافة إلى سلتك بنجاح! 🛒"); 
        }

        function showToast(message) {
            const container = document.getElementById('toast-container');
            if (!container) return;

            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.innerHTML = `<i class="fas fa-check-circle"></i> <span>${message}</span>`;
            
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('fade-out');
                toast.addEventListener('animationend', () => toast.remove());
            }, 3000);
        }

        function updateCartCount() {
            const cartBadge = document.getElementById('cart-counter-badge');
            if (cartBadge) cartBadge.textContent = cart.length; 
        }

        // 6. دوال الفلترة والبحث
        function filterCategory(catName, btnElement) {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            const filtered = (catName === 'الكل') ? localProducts : localProducts.filter(p => p.category === catName);
            renderProducts(filtered);
        }

        document.getElementById('search-input')?.addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();
            renderProducts(localProducts.filter(p => p.name.toLowerCase().includes(query)));
        });

        // 7. دوال إدارة الحسابات (تسجيل الدخول / الخروج)
        supabaseClient.auth.onAuthStateChange((event, session) => {
            updateAuthUI(session);
        });

        function updateAuthUI(session) {
            const authContainer = document.getElementById('auth-container');
            if (!authContainer) return;

            if (session) {
                let fullName = session.user.user_metadata?.full_name || "حسابي";
                let firstName = fullName.split(' ')[0]; 

                authContainer.innerHTML = `
                    <a href="#" onclick="askToLogout(event)" class="header-action-btn" style="text-decoration: none;" title="تسجيل الخروج">
                        <i class="fas fa-user" style="color: var(--primary-color);"></i> 
                        <span style="margin: 0 6px; font-weight: bold; font-size: 14px;">${firstName}</span>
                        <i class="fas fa-sign-out-alt" style="color: #dc3545; font-size: 15px;" title="خروج"></i>
                    </a>
                `;
            } else {
                authContainer.innerHTML = `
                    <a href="login.html" class="header-action-btn" style="text-decoration: none;">
                        <i class="fas fa-user-plus"></i> 
                        <span class="hide-on-mobile">تسجيل الدخول</span>
                        <span class="mobile-only-text">حسابي</span>
                    </a>
                `;
            }
        }

        function askToLogout(event) {
            event.preventDefault();
            Swal.fire({
                title: 'تسجيل الخروج؟',
                text: 'هل تود مغادرة الحساب؟', 
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#e74c3c',
                cancelButtonColor: '#1a365d',
                confirmButtonText: 'نعم', 
                cancelButtonText: 'إلغاء',
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    logoutUser(event);
                }
            });
        }

        async function logoutUser(event) {
            event.preventDefault();
            const { error } = await supabaseClient.auth.signOut();
            if (!error) {
                Swal.fire({
                    icon: 'success',
                    title: 'إلى اللقاء!',
                    text: 'تم تسجيل الخروج بنجاح',
                    timer: 1500,
                    showConfirmButton: false
                }).then(() => {
                    window.location.reload(); 
                });
            }
        }
    </script>
</body>
</html>
