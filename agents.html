    <style>
        :root {
            --primary-color: #2c3e50; 
            --secondary-color: #1a365d;
            --accent-color: #d35400;
            --bg-color: #f8f9fa;
            --border-color: #e2e8f0;
            --profit-color: #27ae60;
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); padding-bottom: 100px; }
        
        .header { background: var(--primary-color); color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h1 { font-size: 22px; margin: 0; display: flex; align-items: center; gap: 10px; }
        .header h1 span { color: #f1c40f; font-size: 14px; background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px; }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 15px; }
        
        .table-wrapper { background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-x: auto; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #edf2f7; padding: 15px; text-align: right; border-bottom: 2px solid #cbd5e0; color: var(--primary-color); font-size: 15px; }
        td { padding: 15px; border-bottom: 1px solid var(--border-color); vertical-align: middle; font-size: 14px; font-weight: 600; color: #333; }
        tr:hover { background: #f8fafc; }

        .product-name-col { display: flex; flex-direction: column; gap: 5px; }
        .brand-badge { background: #e2e8f0; color: var(--primary-color); font-size: 11px; padding: 3px 10px; border-radius: 12px; width: fit-content; font-weight: bold; }
        
        .qty-input { width: 80px; padding: 10px; border: 2px solid var(--border-color); border-radius: 6px; text-align: center; font-weight: bold; font-size: 16px; outline: none; transition: 0.2s; }
        .qty-input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(211, 84, 0, 0.1); }

        .text-profit { color: var(--profit-color); font-weight: bold; }
        .text-cost { color: #c0392b; font-weight: bold; }

        .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 1px solid var(--border-color); box-shadow: 0 -5px 20px rgba(0,0,0,0.08); padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .totals-group { display: flex; gap: 40px; }
        .total-item { display: flex; flex-direction: column; }
        .total-item span { font-size: 13px; color: #7f8c8d; font-weight: 600; margin-bottom: 3px; }
        .total-item strong { font-size: 20px; color: var(--primary-color); }
        .total-item strong.profit-val { color: var(--profit-color); }

        .btn-order { background: var(--accent-color); color: white; border: none; padding: 14px 35px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; display: flex; gap: 10px; align-items: center; }
        .btn-order:hover { background: #e67e22; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(211, 84, 0, 0.3); }

        @media (max-width: 768px) {
            .header { padding: 15px; }
            .totals-group { gap: 15px; }
            .total-item strong { font-size: 16px; }
            .btn-order { padding: 12px 20px; font-size: 14px; }
            .bottom-bar { padding: 15px; flex-direction: column; gap: 15px; align-items: stretch; }
            .totals-group { justify-content: space-between; }
        }
    </style>
</head>

        function renderTable() {
            const tbody = document.getElementById('agents-grid');
            tbody.innerHTML = '';

            agentsProducts.forEach((product, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color:#7f8c8d; font-family: monospace;">${product.id}</td>
                    <td>
                        <div class="product-name-col">
                            <span class="brand-badge">${product.brand === 'nan' ? 'عام' : product.brand}</span>
                            <span>${product.name}</span>
                        </div>
                    </td>
                    <td>${product.capacity}</td>
                    <td style="color: var(--primary-color); font-weight: bold;">$${product.wholesalePrice.toFixed(2)}</td>
                    <td style="color: var(--accent-color); font-weight: bold;">$${product.distributorPrice.toFixed(2)}</td>
                    <td>
<input type="number" min="0" value="0" class="qty-input" data-index="${index}" oninput="updateRow(this)" onkeydown="handleEnter(event, ${index})">                    </td>
                    <td id="cost-${index}">$0.00</td>
                    <td id="profit-${index}" class="text-profit">$0.00</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateRow(input) {
            const index = input.getAttribute('data-index');
            const qty = parseInt(input.value) || 0;
            agentsProducts[index].qty = qty;

            const product = agentsProducts[index];
            
            const rowCost = product.distributorPrice * qty; 
            const expectedRevenue = product.wholesalePrice * qty; 
            const rowProfit = expectedRevenue - rowCost; 

            document.getElementById(`cost-${index}`).innerText = `$${rowCost.toFixed(2)}`;
            document.getElementById(`profit-${index}`).innerText = `$${rowProfit.toFixed(2)}`;

            calculateTotals();
        }
        function handleEnter(event, currentIndex) {
    if (event.key === 'Enter') {
        event.preventDefault(); // نمنع أي سلوك افتراضي للزر
        const nextIndex = currentIndex + 1;
        const nextInput = document.querySelector(`.qty-input[data-index="${nextIndex}"]`);
        
        if (nextInput) {
            nextInput.focus(); // نقل المؤشر إلى السطر التالي
            nextInput.select(); // تحديد الرقم (0) ليتم الكتابة فوقه مباشرة دون الحاجة لمسحه
        }
    }
}

        function calculateTotals() {
            let totalQty = 0;
            let totalCost = 0;
            let totalProfit = 0;

            agentsProducts.forEach(p => {
                if (p.qty > 0) {
                    totalQty += p.qty;
                    totalCost += (p.distributorPrice * p.qty);
                    totalProfit += ((p.wholesalePrice * p.qty) - (p.distributorPrice * p.qty));
                }
            });

            document.getElementById('bar-total-qty').innerText = totalQty;
            document.getElementById('bar-total-cost').innerText = `$${totalCost.toFixed(2)}`;
            document.getElementById('bar-total-profit').innerText = `$${totalProfit.toFixed(2)}`;
        }

        document.addEventListener('DOMContentLoaded', renderTable);
    </script>
