<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | شركة أركان</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header" style="text-align: center; padding: 20px 0;">
        <a href="index.html" style="text-decoration: none; display: inline-block;">
            <div class="logo" style="direction: ltr; display: flex; justify-content: center; align-items: center;">Arkan<span style="margin-left: 5px;">COMPANY</span></div>
        </a>
    </header>

    <main class="auth-page-container">
        <div class="auth-box">
            <div class="auth-header">
                <h2>إنشاء حساب جديد</h2>
                <p>انضم إلينا لتتمكن من متابعة طلباتك بكل سهولة</p>
            </div>

            <div class="auth-form">
                <div class="input-group">
                    <label for="reg-name">الاسم الكامل / اسم الصيدلية</label>
                    <div class="input-with-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="reg-name" placeholder="أدخل اسمك الكريم" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="reg-email">البريد الإلكتروني</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="reg-email" placeholder="example@mail.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="reg-password">كلمة المرور</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="reg-password" placeholder="أدخل كلمة مرور قوية (6 أحرف على الأقل)" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="reg-confirm-password">تأكيد كلمة المرور</label>
                    <div class="input-with-icon">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="reg-confirm-password" placeholder="أعد إدخال كلمة المرور" required>
                    </div>
                </div>

                <button type="button" class="btn-auth" onclick="registerUser(event)">إنشاء حساب</button>
            </div>
            
            <div class="auth-footer">
                <p>لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js?v=2"></script>
</body>
</html>
