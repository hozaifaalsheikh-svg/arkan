<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعيين كلمة مرور جديدة | شركة أركان</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header" style="text-align: center; padding: 20px 0;">
        <a href="index.html" style="text-decoration: none; display: inline-block;">
            <div class="logo" style="direction: ltr; display: flex; justify-content: center; align-items: center;">Arkan<span>COMPANY</span></div>
        </a>
    </header>

    <main class="auth-page-container">
        <div class="auth-box">
            <div class="auth-header">
                <h2>تعيين كلمة مرور جديدة</h2>
                <p>الرجاء إدخال كلمة المرور الجديدة لحسابك.</p>
            </div>

            <form id="update-password-form" class="auth-form">
                <div class="input-group">
                    <label for="new-password">كلمة المرور الجديدة</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="new-password" placeholder="أدخل كلمة مرور قوية" required>
                    </div>
                </div>
                <button type="submit" class="btn-auth">حفظ التغييرات</button>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script>
        document.getElementById('update-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;

            const { data, error } = await supabaseClient.auth.updateUser({
                password: newPassword
            });

            if (error) {
                Swal.fire({ icon: 'error', title: 'حدث خطأ', text: error.message, confirmButtonColor: '#e74c3c' });
            } else {
                Swal.fire({
                    icon: 'success',
                    title: 'تم بنجاح!',
                    text: 'تم تحديث كلمة المرور. سيتم تحويلك للرئيسية.',
                    confirmButtonColor: '#2ecc71',
                    timer: 2000,
                    showConfirmButton: false
                }).then(() => {
                    window.location.href = 'index.html';
                });
            }
        });
    </script>
</body>
</html>
