<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الطلبات المتقدمة | شركة أركان</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #1a365d; --secondary-color: #f27a1a; --bg-color: #f0f4f8; --success: #27ae60; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-color); padding: 15px; margin: 0; box-sizing: border-box; }
        
        .admin-container { width: 100%; max-width: 100%; margin: 0 auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); box-sizing: border-box; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        
        .header-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 10px 16px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; border: none; font-family: inherit; font-size: 14px; }
        .btn-dash { background: var(--primary-color); color: #fff; }
        .btn-store { background: var(--secondary-color); color: #fff; }
        .btn-excel { background: var(--success); color: #fff; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        /* الجدول الاحترافي */
        /* أضفنا min-height لضمان عدم اختفاء القوائم المنسدلة في حال كان الجدول فارغاً */
        .table-wrapper { overflow-x: auto; overflow-y: visible; border-radius: 10px; border: 1px solid #eee; width: 100%; min-height: 450px; }
        table { width: 100%; border-collapse: collapse; background: white; table-layout: auto; }
        
        /* تنسيق عناوين الأعمدة لتستوعب القوائم المنسدلة */
        th { background-color: var(--primary-color); color: white; padding: 12px; font-weight: 600; text-align: right; user-select: none; white-space: nowrap; position: relative; }
        .th-content { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .th-content:hover { color: var(--secondary-color); }
        .filter-icon { font-size: 12px; color: rgba(255,255,255,0.7); transition: 0.2s; padding: 5px; border-radius: 4px; }
        .filter-icon:hover { background: rgba(255,255,255,0.2); color: #fff; }

        /* تصميم القوائم المنسدلة للفلترة (Excel Like) */
        .filter-popup { display: none; position: absolute; top: 100%; right: 0; background: #fff; border: 1px solid #ddd; box-shadow: 0 5px 15px rgba(0,0,0,0.15); border-radius: 8px; padding: 12px; z-index: 999; min-width: 200px; margin-top: 5px; cursor: default; }
        .filter-popup::before { content: ''; position: absolute; top: -6px; right: 15px; border-width: 0 6px 6px 6px; border-style: solid; border-color: transparent transparent #fff transparent; }
        
        .sort-btns { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .sort-btns button { background: #f8f9fa; border: 1px solid #eee; padding: 8px; border-radius: 5px; font-family: inherit; font-size: 13px; cursor: pointer; display: flex; justify-content: flex-start; align-items: center; gap: 8px; color: #333; transition: 0.2s; }
        .sort-btns button:hover { background: #e2e8f0; border-color: #cbd5e1; color: var(--primary-color); }
        
        .filter-divider { height: 1px; background: #eee; margin: 10px 0; }
        .filter-input { width: 100%; box-sizing: border-box; padding: 8px 10px; border: 1px solid #ddd; border-radius: 5px; font-family: inherit; font-size: 12px; outline: none; }
        .filter-input:focus { border-color: var(--primary-color); }
        
        td { padding: 16px 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        tr:hover td { background-color: #f8fbff; }
        .status-select { padding: 8px 12px; border-radius: 6px; border: none; font-family: inherit; font-weight: bold; outline: none; cursor: pointer; width: 100%; min-width: 120px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        @media (max-width: 768px) { 
            body { padding: 0 !important; background-color: #fff; }
            .admin-container { padding: 15px !important; border-radius: 0 !important; box-shadow: none !important; min-height: 100vh; }
            .admin-header { flex-direction: column; align-items: flex-start; }
            .header-buttons { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
            .btn-excel { grid-column: span 2; justify-content: center; }
            .btn { font-size: 12px; justify-content: center; padding: 10px; }
            
            .table-wrapper { padding-bottom: 15px; } 
            .table-wrapper::-webkit-scrollbar { height: 8px; }
            .table-wrapper::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
            .table-wrapper::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
            td, th { padding: 12px 10px; font-size: 13px; }
            td { white-space: nowrap; } 
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1 style="margin: 0; font-size: 24px;"><i class="fas fa-clipboard-list"></i> إدارة الطلبات المتقدمة</h1>
            <div class="header-buttons">
                <a href="admin.html" class="btn btn-dash"><i class="fas fa-tachometer-alt"></i> لوحة التحكم</a>
                <a href="index.html" class="btn btn-store"><i class="fas fa-store"></i> المتجر</a>
                <button onclick="exportToExcel()" class="btn btn-excel"><i class="fas fa-file-excel"></i> تصدير إكسل</button>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>
                            <div class="th-content" onclick="togglePopup('popup-id', event)">
                                <span>رقم</span> <i class="fas fa-filter filter-icon"></i>
                            </div>
                            <div id="popup-id" class="filter-popup" onclick="event.stopPropagation()">
                                <div class="sort-btns">
                                    <button onclick="sortData('id', true)"><i class="fas fa-sort-numeric-up"></i> ترتيب من الأقدم للأحدث</button>
                                    <button onclick="sortData('id', false)"><i class="fas fa-sort-numeric-down"></i> ترتيب من الأحدث للأقدم</button>
                                </div>
                                <div class="filter-divider"></div>
                                <input type="text" class="filter-input" placeholder="بحث برقم الطلب..." oninput="applyFilter('id', this.value)">
                            </div>
                        </th>
                        
                        <th>
                            <div class="th-content" onclick="togglePopup('popup-date', event)">
                                <span>التاريخ</span> <i class="fas fa-filter filter-icon"></i>
                            </div>
                            <div id="popup-date" class="filter-popup" onclick="event.stopPropagation()">
                                <div class="sort-btns">
                                    <button onclick="sortData('created_at', true)"><i class="fas fa-calendar-plus"></i> الأقدم أولاً</button>
                                    <button onclick="sortData('created_at', false)"><i class="fas fa-calendar-minus"></i> الأحدث أولاً</button>
                                </div>
                            </div>
                        </th>

                        <th>
                            <div class="th-content" onclick="togglePopup('popup-name', event)">
                                <span>العميل</span> <i class="fas fa-filter filter-icon"></i>
                            </div>
                            <div id="popup-name" class="filter-popup" onclick="event.stopPropagation()">
                                <div class="sort-btns">
                                    <button onclick="sortData('customer_name', true)"><i class="fas fa-sort-alpha-down"></i> ترتيب أبجدي (أ-ي)</button>
                                    <button onclick="sortData('customer_name', false)"><i class="fas fa-sort-alpha-up"></i> ترتيب أبجدي (ي-أ)</button>
                                </div>
                                <div class="filter-divider"></div>
                                <input type="text" class="filter-input" placeholder="بحث باسم العميل..." oninput="applyFilter('customer_name', this.value)">
                            </div>
                        </th>

                        <th>
                            <div class="th-content" onclick="togglePopup('popup-phone', event)">
                                <span>رقم الهاتف</span> <i class="fas fa-filter filter-icon"></i>
                            </div>
                            <div id="popup-phone" class="filter-popup" onclick="event.stopPropagation()">
                                <input type="text" class="filter-input" placeholder="بحث برقم الهاتف..." oninput="applyFilter('customer_phone', this.value)">
                            </div>
                        </th>

                        <th>
                            <div class="th-content" onclick="togglePopup('popup-city', event)">
                                <span>المدينة/العنوان</span> <i class="fas fa-filter filter-icon"></i>
                            </div>
                            <div id="popup-city" class="filter-popup" onclick="event.stopPropagation()">
                                <div class="sort-btns">
                                    <button onclick="sortData('city', true)"><i class="fas fa-sort-alpha-down"></i> ترتيب أبجدي (أ-ي)</button>
                                    <button onclick="sortData('city', false)"><i class="fas fa-sort-alpha-up"></i> ترتيب أبجدي (ي-أ)</button>
                                </div>
                                <div class="filter-divider"></div>
                                <input type="text" class="filter-input" placeholder="بحث بالمدينة..." oninput="applyFilter('city', this.value)">
                            </div>
                        </th>

                        <th>تفاصيل المنتجات</th>

                        <th>
                            <div class="th-content" onclick="togglePopup('popup-total', event)">
                                <span>الإجمالي</span> <i class="fas fa-filter filter-icon"></i>
                            </div>
                            <div id="popup-total" class="filter-popup" onclick="event.stopPropagation()">
                                <div class="sort-btns">
                                    <button onclick="sortData('total_amount', false)"><i class="fas fa-sort-amount-down"></i> السعر (الأعلى أولاً)</button>
                                    <button onclick="sortData('total_amount', true)"><i class="fas fa-sort-amount-up"></i> السعر (الأقل أولاً)</button>
                                </div>
                            </div>
                        </th>

                        <th>
                            <div class="th-content" onclick="togglePopup('popup-status', event)">
                                <span>الحالة</span> <i class="fas fa-filter filter-icon"></i>
                            </div>
                            <div id="popup-status" class="filter-popup" onclick="event.stopPropagation()">
                                <div class="sort-btns">
                                    <select class="filter-input" onchange="applyFilter('status', this.value)" style="cursor: pointer;">
                                        <option value="all">كافة الحالات (عرض الكل)</option>
                                        <option value="قيد المراجعة">قيد المراجعة</option>
                                        <option value="قيد التجهيز">قيد التجهيز</option>
                                        <option value="تم الشحن">تم الشحن</option>
                                        <option value="تم التسليم">تم التسليم</option>
                                        <option value="ملغي">ملغي</option>
                                    </select>
                                </div>
                            </div>
                        </th>
                    </tr>
                </thead>
                <tbody id="orders-table-body">
                    <tr><td colspan="8" style="text-align:center; padding: 40px;"><i class="fas fa-spinner fa-spin" style="font-size: 24px; margin-bottom: 10px; color: var(--primary-color);"></i><br>جاري جلب الطلبات من السيرفر...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        const client = window.supabase.createClient("https://aalpziidoobrqeppsvmi.supabase.co", "sb_publishable_Dzt7QBcxmcidwgZE3rkQcA_yoKmje1w");
        
        let allOrders = [];
        let filteredOrders = [];
        let currentSort = { column: 'created_at', asc: false };
        
        // كائن لحفظ القيم النشطة في فلاتر كل عمود
        let columnFilters = { id: '', customer_name: '', customer_phone: '', city: '', status: 'all' };

        // إخفاء القوائم المنسدلة عند النقر في أي مكان آخر
        document.addEventListener('click', function() {
            document.querySelectorAll('.filter-popup').forEach(popup => {
                popup.style.display = 'none';
            });
        });

        // دالة فتح/إغلاق القائمة المنسدلة للعمود
        function togglePopup(popupId, event) {
            event.stopPropagation();
            const popup = document.getElementById(popupId);
            const isCurrentlyOpen = popup.style.display === 'block';
            
            // إغلاق كل القوائم الأخرى أولاً
            document.querySelectorAll('.filter-popup').forEach(p => p.style.display = 'none');
            
            // فتح القائمة المطلوبة إذا لم تكن مفتوحة بالفعل
            if (!isCurrentlyOpen) {
                popup.style.display = 'block';
            }
        }

        async function fetchOrders() {
            const { data: orders, error } = await client.from('orders').select('*').order('created_at', { ascending: false });
            if (!error && orders) {
                allOrders = orders;
                filteredOrders = [...allOrders]; 
                renderTable(filteredOrders);
            } else {
                document.getElementById('orders-table-body').innerHTML = '<tr><td colspan="8" style="color:red; text-align:center;">خطأ في الاتصال بقاعدة البيانات</td></tr>';
            }
        }

        function renderTable(dataArray) {
            const tbody = document.getElementById('orders-table-body');
            let html = '';
            
            if (dataArray.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding: 30px;">لا توجد بيانات مطابقة للفلتر المحدد</td></tr>';
                return;
            }

            dataArray.forEach(o => {
                const date = new Date(o.created_at).toLocaleString('ar-EG', { dateStyle: 'short', timeStyle: 'short' });
                const statusColor = getStatusColor(o.status);
                const textColor = o.status === 'قيد المراجعة' ? '#333' : '#fff';
                
                let itemsStr = '';
                if(o.order_details && Array.isArray(o.order_details)){
                    itemsStr = o.order_details.map(i => `${i.qty}x ${i.name}`).join(' ، ');
                } else {
                    itemsStr = 'غير متوفر';
                }

                html += `<tr>
                    <td style="font-weight: bold; color: var(--primary-color); white-space: nowrap;">#${o.id}</td>
                    <td style="font-size: 12px; color: #666; white-space: nowrap;">${date}</td>
                    <td style="font-weight: bold; white-space: normal; min-width: 120px;">${o.customer_name || '-'}</td>
                    <td style="direction: ltr; text-align: right; white-space: nowrap;">${o.customer_phone || '-'}</td>
                    <td style="white-space: normal; min-width: 150px;">${o.city || '-'} ${o.detailed_address ? '('+o.detailed_address+')' : ''}</td>
                    <td style="font-size: 13px; line-height: 1.6; white-space: normal; min-width: 200px;">${itemsStr}</td>
                    <td style="font-weight: bold; color: var(--secondary-color); white-space: nowrap;">${Number(o.total_amount).toLocaleString()} ل.س</td>
                    <td style="white-space: nowrap;">
                        <select class="status-select" onchange="updateStatus(${o.id}, this.value)" style="background-color: ${statusColor}; color: ${textColor};">
                            <option value="قيد المراجعة" ${o.status=='قيد المراجعة'?'selected':''}>قيد المراجعة</option>
                            <option value="قيد التجهيز" ${o.status=='قيد التجهيز'?'selected':''}>قيد التجهيز</option>
                            <option value="تم الشحن" ${o.status=='تم الشحن'?'selected':''}>تم الشحن</option>
                            <option value="تم التسليم" ${o.status=='تم التسليم'?'selected':''}>تم التسليم</option>
                            <option value="ملغي" ${o.status=='ملغي'?'selected':''}>ملغي</option>
                        </select>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        // تسجيل إدخال الفلتر من أي عمود وتطبيقه فوراً
        function applyFilter(column, value) {
            columnFilters[column] = value.toLowerCase();
            runFilters();
        }

        // معالجة كافة الفلاتر معاً
        function runFilters() {
            filteredOrders = allOrders.filter(o => {
                const matchesId = columnFilters.id === '' || String(o.id).includes(columnFilters.id);
                const matchesName = columnFilters.customer_name === '' || (o.customer_name || '').toLowerCase().includes(columnFilters.customer_name);
                const matchesPhone = columnFilters.customer_phone === '' || (o.customer_phone || '').toLowerCase().includes(columnFilters.customer_phone);
                const matchesCity = columnFilters.city === '' || (`${o.city} ${o.detailed_address}`).toLowerCase().includes(columnFilters.city);
                const matchesStatus = columnFilters.status === 'all' || o.status === columnFilters.status;

                return matchesId && matchesName && matchesPhone && matchesCity && matchesStatus;
            });
            
            // إعادة الترتيب بناءً على آخر ترتيب محفوظ
            applySort(); 
        }

        // استدعاء من أزرار الترتيب في القوائم المنسدلة
        function sortData(column, asc) {
            currentSort = { column: column, asc: asc };
            
            // إغلاق كل القوائم المنسدلة بعد النقر على الترتيب
            document.querySelectorAll('.filter-popup').forEach(p => p.style.display = 'none');
            
            applySort();
        }

        // تنفيذ عملية الترتيب الفعلي للبيانات
        function applySort() {
            filteredOrders.sort((a, b) => {
                let valA = a[currentSort.column];
                let valB = b[currentSort.column];
                
                if(valA === null) valA = '';
                if(valB === null) valB = '';

                if (currentSort.column === 'id' || currentSort.column === 'total_amount') {
                    valA = Number(valA) || 0;
                    valB = Number(valB) || 0;
                } else {
                    valA = valA.toString().toLowerCase();
                    valB = valB.toString().toLowerCase();
                }

                if (valA < valB) return currentSort.asc ? -1 : 1;
                if (valA > valB) return currentSort.asc ? 1 : -1;
                return 0;
            });
            renderTable(filteredOrders);
        }

        function exportToExcel() {
            const excelData = filteredOrders.map(o => {
                let itemsStr = '';
                if(o.order_details && Array.isArray(o.order_details)){
                    itemsStr = o.order_details.map(i => `${i.qty}x ${i.name}`).join(' , ');
                }
                return {
                    "رقم الطلب": o.id,
                    "التاريخ": new Date(o.created_at).toLocaleDateString('ar-EG'),
                    "العميل": o.customer_name,
                    "رقم الهاتف": o.customer_phone,
                    "المدينة/العنوان": `${o.city || ''} - ${o.detailed_address || ''}`,
                    "المنتجات": itemsStr,
                    "الإجمالي (ل.س)": Number(o.total_amount),
                    "حالة الطلب": o.status
                };
            });

            const worksheet = XLSX.utils.json_to_sheet(excelData);
            worksheet['!dir'] = 'rtl';
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "طلبات أركان");
            XLSX.writeFile(workbook, `Arkan_Orders_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        function getStatusColor(status) {
            switch(status) {
                case 'تم التسليم': return '#27ae60';
                case 'تم الشحن': return '#2980b9';
                case 'قيد التجهيز': return '#8e44ad';
                case 'ملغي': return '#c0392b';
                default: return '#f1c40f'; 
            }
        }

        async function updateStatus(id, newStatus) {
            const { error } = await client.from('orders').update({ status: newStatus }).eq('id', id);
            if(error) {
                alert("حدث خطأ أثناء التحديث");
            } else {
                const orderIndex = allOrders.findIndex(o => o.id === id);
                if(orderIndex > -1) allOrders[orderIndex].status = newStatus;
                runFilters(); // تحديث فوري بناءً على الفلاتر النشطة
            }
        }

        fetchOrders();
    </script>
</body>
</html>
