<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الطلبات | شركة أركان</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #1a365d; }
        body { font-family: 'Cairo', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .admin-container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        
        .btn-nav { background: #1a365d; color: #fff; text-decoration: none; padding: 10px 18px; border-radius: 8px; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #ddd; }
        th { background-color: #1a365d; color: white; }
        
        @media (max-width: 600px) { .hide-on-mobile { display: none !important; } }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>إدارة الطلبات</h1>
            <a href="admin.html" class="btn-nav"><i class="fas fa-arrow-right"></i> العودة للوحة التحكم</a>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>رقم</th><th>العميل</th><th class="hide-on-mobile">العنوان</th><th>الإجمالي</th><th>الحالة</th></tr>
                </thead>
                <tbody id="orders-table-body"><tr><td colspan="5">جاري التحميل...</td></tr></tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const client = window.supabase.createClient("https://aalpziidoobrqeppsvmi.supabase.co", "sb_publishable_Dzt7QBcxmcidwgZE3rkQcA_yoKmje1w");
        async function fetchOrders() {
            const { data: orders } = await client.from('orders').select('*');
            let html = '';
            orders.forEach(o => {
                html += `<tr><td>#${o.id}</td><td>${o.customer_name}</td><td class="hide-on-mobile">${o.city}</td><td>${Number(o.total_amount).toLocaleString()}</td><td>${o.status}</td></tr>`;
            });
            document.getElementById('orders-table-body').innerHTML = html;
        }
        fetchOrders();
    </script>
</body>
</html>
