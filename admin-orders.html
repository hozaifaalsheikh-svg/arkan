<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الطلبات | شركة أركان</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #1a365d; --secondary-color: #f27a1a; --bg-color: #f4f7f6; --border-color: #cbd5e1; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-color); padding: 20px; margin: 0; box-sizing: border-box; }
        
        .admin-container { width: 100%; max-width: 1200px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }

        /* شريط الإحصائيات (مدمج وأنيق) */
        .stats-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #fff; padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); text-align: center; transition: all 0.3s ease; }
        .stat-card:hover { border-color: var(--secondary-color); background: #fffaf7; }
        .stat-card h4 { margin: 0; font-size: 10px; color: #64748b; text-transform: uppercase; margin-bottom: 5px; }
        .stat-card p { margin: 0; font-size: 16px; font-weight: 700; color: var(--primary-color); }

        .btn { padding: 8px 14px; border-radius: 6px; text-decoration: none; font-weight: bold; transition: 0.3s; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; border: none; font-family: inherit; font-size: 13px; }
        .btn-dash { background: var(--primary-color); color: #fff; }
        .btn-store { background: var(--secondary-color); color: #fff; }
        .btn-excel { background: #27ae60; color: #fff; }

        .table-wrapper { overflow-x: auto; border: 1px solid var(--border-color); width: 100%; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid var(--border-color); padding: 12px 10px; font-size: 13px; color: #334155; text-align: right; font-weight: 600; /* الخط عريض كما طلبت */ }
        tr:nth-child(even) td { background-color: #f8fafc; }
        th { background-color: var(--primary-color); color: #ffffff !important; }
        
        .filter-popup { display: none; position: absolute; top: 100%; right: 0; background: #fff; border: 1px solid #ddd; box-shadow: 0 5px 15px rgba(0,0,0,0.2); border-radius: 6px; padding: 10px; z-index: 999; min-width: 150px; }
        .filter-input { width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }

        .status-select { padding: 6px; border-radius: 4px; font-weight: 700; cursor: pointer; width: 100%; border: 1px solid transparent; }
        
        /* تحسينات الموبايل */
        @media (max-width: 768px) {
            .stats-container { grid-template-columns: repeat(3, 1fr); }
            th, td { font-size: 12px; padding: 8px 5px; }
            .status-select { min-width: 100px; }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1 style="margin: 0; font-size: 20px;"><i class="fas fa-clipboard-list"></i> إدارة الطلبات</h1>
            <div style="display:flex; gap:10px;">
                <a href="admin.html" class="btn btn-dash"><i class="fas fa-tachometer-alt"></i></a>
                <button onclick="exportToExcel()" class="btn btn-excel"><i class="fas fa-file-excel"></i></button>
            </div>
        </div>

        <div class="stats-container" id="stats-bar"></div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="position:relative;">رقم <i class="fas fa-filter" onclick="togglePopup('pop-id', event)" style="cursor:pointer; font-size:10px;"></i>
                            <div id="pop-id" class="filter-popup" onclick="event.stopPropagation()"><input type="text" class="filter-input" placeholder="بحث..." oninput="applyFilter('id', this.value)"></div>
                        </th>
                        <th>التاريخ</th>
                        <th style="position:relative;">العميل <i class="fas fa-filter" onclick="togglePopup('pop-name', event)" style="cursor:pointer; font-size:10px;"></i>
                            <div id="pop-name" class="filter-popup" onclick="event.stopPropagation()"><input type="text" class="filter-input" placeholder="بحث..." oninput="applyFilter('customer_name', this.value)"></div>
                        </th>
                        <th>الهاتف</th>
                        <th>العنوان</th>
                        <th>المنتجات</th>
                        <th>الإجمالي</th>
                        <th style="position:relative;">الحالة <i class="fas fa-filter" onclick="togglePopup('pop-stat', event)" style="cursor:pointer; font-size:10px;"></i>
                             <div id="pop-stat" class="filter-popup" onclick="event.stopPropagation()">
                                <select class="filter-input" onchange="applyFilter('status', this.value)">
                                    <option value="all">الكل</option>
                                    <option value="قيد المراجعة">قيد المراجعة</option>
                                    <option value="قيد التجهيز">قيد التجهيز</option>
                                    <option value="تم الشحن">تم الشحن</option>
                                    <option value="تم التسليم">تم التسليم</option>
                                    <option value="ملغي">ملغي</option>
                                </select>
                            </div>
                        </th>
                    </tr>
                </thead>
                <tbody id="orders-table-body"></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        const client = window.supabase.createClient("https://aalpziidoobrqeppsvmi.supabase.co", "sb_publishable_Dzt7QBcxmcidwgZE3rkQcA_yoKmje1w");
        let allOrders = [], filteredOrders = [], filters = { id: '', customer_name: '', status: 'all' };

        document.addEventListener('click', () => document.querySelectorAll('.filter-popup').forEach(p => p.style.display = 'none'));
        function togglePopup(id, e) { e.stopPropagation(); document.querySelectorAll('.filter-popup').forEach(p => p.style.display = 'none'); document.getElementById(id).style.display = 'block'; }

        async function fetchOrders() {
            const { data } = await client.from('orders').select('*').order('created_at', { ascending: false });
            allOrders = data || [];
            filteredOrders = [...allOrders];
            updateStats();
            renderTable(filteredOrders);
        }

        function updateStats() {
            const statuses = ['قيد المراجعة', 'قيد التجهيز', 'تم الشحن', 'تم التسليم', 'ملغي'];
            document.getElementById('stats-bar').innerHTML = statuses.map(s => `
                <div class="stat-card"><h4>${s}</h4><p>${allOrders.filter(o => o.status === s).length}</p></div>
            `).join('');
        }

        function renderTable(data) {
            document.getElementById('orders-table-body').innerHTML = data.map(o => `
                <tr>
                    <td>#${o.id}</td>
                    <td>${new Date(o.created_at).toLocaleDateString('ar-EG')}</td>
                    <td>${o.customer_name}</td>
                    <td>${o.customer_phone}</td>
                    <td>${o.city}</td>
                    <td>${(o.order_details || []).map(i => i.name).join('، ')}</td>
                    <td style="color:var(--secondary-color)">${Number(o.total_amount).toLocaleString()}</td>
                    <td><select class="status-select" onchange="updateStatus(${o.id}, this.value)" style="background:${getStatusColor(o.status).bg}; color:${getStatusColor(o.status).text}">${['قيد المراجعة', 'قيد التجهيز', 'تم الشحن', 'تم التسليم', 'ملغي'].map(s => `<option value="${s}" ${o.status==s?'selected':''}>${s}</option>`).join('')}</select></td>
                </tr>
            `).join('');
        }

        function getStatusColor(s) {
            switch(s) {
                case 'تم التسليم': return { bg: '#d1fae5', text: '#065f46' };
                case 'ملغي': return { bg: '#fee2e2', text: '#991b1b' };
                default: return { bg: '#fff', text: '#334155' };
            }
        }

        async function updateStatus(id, val) { await client.from('orders').update({ status: val }).eq('id', id); fetchOrders(); }
        function applyFilter(col, val) { filters[col] = val.toLowerCase(); filteredOrders = allOrders.filter(o => (filters.id === '' || String(o.id).includes(filters.id)) && (filters.customer_name === '' || (o.customer_name || '').toLowerCase().includes(filters.customer_name)) && (filters.status === 'all' || o.status === filters.status)); renderTable(filteredOrders); }
        function exportToExcel() { const ws = XLSX.utils.json_to_sheet(filteredOrders); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Orders"); XLSX.writeFile(wb, "Orders.xlsx"); }
        
        fetchOrders();
    </script>
</body>
</html>
