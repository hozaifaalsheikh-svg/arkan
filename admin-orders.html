<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الطلبات المتقدمة | شركة أركان</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #1a365d; --secondary-color: #f27a1a; --bg-color: #f0f4f8; --success: #27ae60; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-color); padding: 15px; margin: 0; box-sizing: border-box; }
        
        .admin-container { width: 100%; max-width: 100%; margin: 0 auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); box-sizing: border-box; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        
        .header-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 10px 16px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; border: none; font-family: inherit; font-size: 14px; }
        .btn-dash { background: var(--primary-color); color: #fff; }
        .btn-store { background: var(--secondary-color); color: #fff; }
        .btn-excel { background: var(--success); color: #fff; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        /* البحث الشامل والفلترة */
        .controls-bar { display: flex; gap: 15px; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px solid #e9ecef; }
        .search-input { flex: 2; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Cairo'; outline: none; transition: 0.3s; font-size: 14px; }
        .search-input:focus, .filter-select:focus, .col-filter:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(26, 54, 93, 0.1); }
        .filter-select { flex: 1; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Cairo', sans-serif; outline: none; transition: 0.3s; background-color: #fff; font-weight: bold; color: var(--primary-color); font-size: 14px; cursor: pointer; }

        /* إعدادات الجدول وعناوين الأعمدة */
        .table-wrapper { overflow-x: auto; border-radius: 10px; border: 1px solid #eee; width: 100%; }
        table { width: 100%; border-collapse: collapse; background: white; table-layout: auto; }
        th { background-color: var(--primary-color); color: white; padding: 12px; font-weight: 600; text-align: right; user-select: none; white-space: nowrap; }
        .sortable { cursor: pointer; transition: 0.2s; }
        .sortable:hover { background-color: #2c5282; }
        th i { font-size: 12px; margin-right: 8px; color: rgba(255,255,255,0.6); }
        
        td { padding: 16px 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        tr:hover td { background-color: #f8fbff; }
        .status-select { padding: 8px 12px; border-radius: 6px; border: none; font-family: inherit; font-weight: bold; outline: none; cursor: pointer; width: 100%; min-width: 120px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* مربعات البحث الخاصة بكل عمود (الجديد) */
        .col-filter-row th { background-color: #2c5282; padding: 8px; border-top: 1px solid rgba(255,255,255,0.1); }
        .col-filter { width: 100%; padding: 6px; font-size: 12px; border: none; border-radius: 4px; box-sizing: border-box; font-family: 'Cairo'; outline: none; text-align: right; }
        .col-filter::placeholder { color: #aaa; }

        @media (max-width: 768px) { 
            body { padding: 0 !important; background-color: #fff; }
            .admin-container { padding: 15px !important; border-radius: 0 !important; box-shadow: none !important; min-height: 100vh; }
            .admin-header { flex-direction: column; align-items: flex-start; }
            .header-buttons { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
            .btn-excel { grid-column: span 2; justify-content: center; }
            .btn { font-size: 12px; justify-content: center; padding: 10px; }
            .controls-bar { flex-direction: column; padding: 10px; gap: 10px; }
            .search-input, .filter-select { width: 100%; box-sizing: border-box; }
            
            .table-wrapper { padding-bottom: 15px; } 
            .table-wrapper::-webkit-scrollbar { height: 8px; }
            .table-wrapper::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
            .table-wrapper::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
            td, th { padding: 12px 10px; font-size: 13px; }
            td { white-space: nowrap; } 
            
            /* إخفاء فلاتر الأعمدة في الموبايل لمنع التشويه، والاعتماد على البحث الشامل */
            .col-filter-row { display: none; }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1 style="margin: 0; font-size: 24px;"><i class="fas fa-clipboard-list"></i> إدارة الطلبات المتقدمة</h1>
            <div class="header-buttons">
                <a href="admin.html" class="btn btn-dash"><i class="fas fa-tachometer-alt"></i> لوحة التحكم</a>
                <a href="index.html" class="btn btn-store"><i class="fas fa-store"></i> المتجر</a>
                <button onclick="exportToExcel()" class="btn btn-excel"><i class="fas fa-file-excel"></i> تصدير إكسل</button>
            </div>
        </div>

        <div class="controls-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 بحث شامل وسريع..." oninput="filterData()">
            <select id="statusFilter" class="filter-select" onchange="filterData()">
                <option value="all">كافة الحالات (عرض الكل)</option>
                <option value="قيد المراجعة">قيد المراجعة</option>
                <option value="قيد التجهيز">قيد التجهيز</option>
                <option value="تم الشحن">تم الشحن</option>
                <option value="تم التسليم">تم التسليم</option>
                <option value="ملغي">ملغي</option>
            </select>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th class="sortable" onclick="sortData('id')">رقم <i class="fas fa-sort"></i></th>
                        <th class="sortable" onclick="sortData('created_at')">التاريخ <i class="fas fa-sort"></i></th>
                        <th class="sortable" onclick="sortData('customer_name')">العميل <i class="fas fa-sort"></i></th>
                        <th class="sortable" onclick="sortData('customer_phone')">رقم الهاتف <i class="fas fa-sort"></i></th>
                        <th class="sortable" onclick="sortData('city')">المدينة/العنوان <i class="fas fa-sort"></i></th>
                        <th>تفاصيل المنتجات</th>
                        <th class="sortable" onclick="sortData('total_amount')">الإجمالي <i class="fas fa-sort"></i></th>
                        <th class="sortable" onclick="sortData('status')">الحالة <i class="fas fa-sort"></i></th>
                    </tr>
                    <tr class="col-filter-row">
                        <th><input type="text" id="col-id" class="col-filter" placeholder="بحث رقم..." oninput="filterData()"></th>
                        <th></th> <th><input type="text" id="col-name" class="col-filter" placeholder="بحث اسم..." oninput="filterData()"></th>
                        <th><input type="text" id="col-phone" class="col-filter" placeholder="بحث هاتف..." oninput="filterData()"></th>
                        <th><input type="text" id="col-city" class="col-filter" placeholder="بحث مدينة..." oninput="filterData()"></th>
                        <th><input type="text" id="col-items" class="col-filter" placeholder="بحث منتج..." oninput="filterData()"></th>
                        <th></th> <th></th> </tr>
                </thead>
                <tbody id="orders-table-body">
                    <tr><td colspan="8" style="text-align:center; padding: 40px;"><i class="fas fa-spinner fa-spin" style="font-size: 24px; margin-bottom: 10px; color: var(--primary-color);"></i><br>جاري جلب الطلبات من السيرفر...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        const client = window.supabase.createClient("https://aalpziidoobrqeppsvmi.supabase.co", "sb_publishable_Dzt7QBcxmcidwgZE3rkQcA_yoKmje1w");
        
        let allOrders = [];
        let filteredOrders = [];
        let currentSort = { column: 'created_at', asc: false };

        async function fetchOrders() {
            const { data: orders, error } = await client.from('orders').select('*').order('created_at', { ascending: false });
            if (!error && orders) {
                allOrders = orders;
                filteredOrders = [...allOrders]; 
                renderTable(filteredOrders);
            } else {
                document.getElementById('orders-table-body').innerHTML = '<tr><td colspan="8" style="color:red; text-align:center;">خطأ في الاتصال بقاعدة البيانات</td></tr>';
            }
        }

        function renderTable(dataArray) {
            const tbody = document.getElementById('orders-table-body');
            let html = '';
            
            if (dataArray.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding: 30px;">لا توجد بيانات مطابقة للبحث أو التصفية</td></tr>';
                return;
            }

            dataArray.forEach(o => {
                const date = new Date(o.created_at).toLocaleString('ar-EG', { dateStyle: 'short', timeStyle: 'short' });
                const statusColor = getStatusColor(o.status);
                const textColor = o.status === 'قيد المراجعة' ? '#333' : '#fff';
                
                let itemsStr = '';
                if(o.order_details && Array.isArray(o.order_details)){
                    itemsStr = o.order_details.map(i => `${i.qty}x ${i.name}`).join(' ، ');
                } else {
                    itemsStr = 'غير متوفر';
                }

                html += `<tr>
                    <td style="font-weight: bold; color: var(--primary-color); white-space: nowrap;">#${o.id}</td>
                    <td style="font-size: 12px; color: #666; white-space: nowrap;">${date}</td>
                    <td style="font-weight: bold; white-space: normal; min-width: 120px;">${o.customer_name || '-'}</td>
                    <td style="direction: ltr; text-align: right; white-space: nowrap;">${o.customer_phone || '-'}</td>
                    <td style="white-space: normal; min-width: 150px;">${o.city || '-'} ${o.detailed_address ? '('+o.detailed_address+')' : ''}</td>
                    <td style="font-size: 13px; line-height: 1.6; white-space: normal; min-width: 200px;">${itemsStr}</td>
                    <td style="font-weight: bold; color: var(--secondary-color); white-space: nowrap;">${Number(o.total_amount).toLocaleString()} ل.س</td>
                    <td style="white-space: nowrap;">
                        <select class="status-select" onchange="updateStatus(${o.id}, this.value)" style="background-color: ${statusColor}; color: ${textColor};">
                            <option value="قيد المراجعة" ${o.status=='قيد المراجعة'?'selected':''}>قيد المراجعة</option>
                            <option value="قيد التجهيز" ${o.status=='قيد التجهيز'?'selected':''}>قيد التجهيز</option>
                            <option value="تم الشحن" ${o.status=='تم الشحن'?'selected':''}>تم الشحن</option>
                            <option value="تم التسليم" ${o.status=='تم التسليم'?'selected':''}>تم التسليم</option>
                            <option value="ملغي" ${o.status=='ملغي'?'selected':''}>ملغي</option>
                        </select>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        // محرك الفلترة المتطور (شامل + حالة + أعمدة فردية)
        function filterData() {
            const globalTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusTerm = document.getElementById('statusFilter').value;
            
            const idTerm = document.getElementById('col-id').value.toLowerCase();
            const nameTerm = document.getElementById('col-name').value.toLowerCase();
            const phoneTerm = document.getElementById('col-phone').value.toLowerCase();
            const cityTerm = document.getElementById('col-city').value.toLowerCase();
            const itemsTerm = document.getElementById('col-items').value.toLowerCase();

            filteredOrders = allOrders.filter(o => {
                // 1. الفلتر الشامل
                const searchStr = `${o.id} ${o.customer_name} ${o.customer_phone} ${o.city}`.toLowerCase();
                const matchesGlobal = globalTerm === '' || searchStr.includes(globalTerm);
                
                // 2. فلتر الحالة
                const matchesStatus = (statusTerm === 'all') ? true : (o.status === statusTerm);
                
                // 3. فلاتر الأعمدة الفردية (AND Logic)
                const matchesId = idTerm === '' || String(o.id).includes(idTerm);
                const matchesName = nameTerm === '' || (o.customer_name || '').toLowerCase().includes(nameTerm);
                const matchesPhone = phoneTerm === '' || (o.customer_phone || '').toLowerCase().includes(phoneTerm);
                const matchesCity = cityTerm === '' || (`${o.city} ${o.detailed_address}`).toLowerCase().includes(cityTerm);
                
                let itemsStr = o.order_details && Array.isArray(o.order_details) ? o.order_details.map(i => i.name).join(' ').toLowerCase() : '';
                const matchesItems = itemsTerm === '' || itemsStr.includes(itemsTerm);

                return matchesGlobal && matchesStatus && matchesId && matchesName && matchesPhone && matchesCity && matchesItems;
            });
            
            sortData(currentSort.column, true); 
        }

        function sortData(column, keepDirection = false) {
            if (!keepDirection) {
                if (currentSort.column === column) {
                    currentSort.asc = !currentSort.asc;
                } else {
                    currentSort.column = column;
                    currentSort.asc = true;
                }
            }

            filteredOrders.sort((a, b) => {
                let valA = a[column];
                let valB = b[column];
                
                if(valA === null) valA = '';
                if(valB === null) valB = '';

                if (column === 'id' || column === 'total_amount') {
                    valA = Number(valA) || 0;
                    valB = Number(valB) || 0;
                } else {
                    valA = valA.toString().toLowerCase();
                    valB = valB.toString().toLowerCase();
                }

                if (valA < valB) return currentSort.asc ? -1 : 1;
                if (valA > valB) return currentSort.asc ? 1 : -1;
                return 0;
            });
            renderTable(filteredOrders);
        }

        function exportToExcel() {
            const excelData = filteredOrders.map(o => {
                let itemsStr = '';
                if(o.order_details && Array.isArray(o.order_details)){
                    itemsStr = o.order_details.map(i => `${i.qty}x ${i.name}`).join(' , ');
                }
                return {
                    "رقم الطلب": o.id,
                    "التاريخ": new Date(o.created_at).toLocaleDateString('ar-EG'),
                    "العميل": o.customer_name,
                    "رقم الهاتف": o.customer_phone,
                    "المدينة/العنوان": `${o.city || ''} - ${o.detailed_address || ''}`,
                    "المنتجات": itemsStr,
                    "الإجمالي (ل.س)": Number(o.total_amount),
                    "حالة الطلب": o.status
                };
            });

            const worksheet = XLSX.utils.json_to_sheet(excelData);
            worksheet['!dir'] = 'rtl';
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "طلبات أركان");
            XLSX.writeFile(workbook, `Arkan_Orders_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        function getStatusColor(status) {
            switch(status) {
                case 'تم التسليم': return '#27ae60';
                case 'تم الشحن': return '#2980b9';
                case 'قيد التجهيز': return '#8e44ad';
                case 'ملغي': return '#c0392b';
                default: return '#f1c40f'; 
            }
        }

        async function updateStatus(id, newStatus) {
            const { error } = await client.from('orders').update({ status: newStatus }).eq('id', id);
            if(error) {
                alert("حدث خطأ أثناء التحديث");
            } else {
                const orderIndex = allOrders.findIndex(o => o.id === id);
                if(orderIndex > -1) allOrders[orderIndex].status = newStatus;
                filterData(); 
            }
        }

        fetchOrders();
    </script>
</body>
</html>
