<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إدارة الطلبات | Arkan COMPANY</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #1a365d; --secondary: #f27a1a; --bg: #f8fafc; 
            --text-main: #334155; --border: #e2e8f0; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); padding: 20px; margin: 0; }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Stats Bar */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); text-align: center; border: 1px solid var(--border); transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); border-color: var(--secondary); }
        .stat-card h4 { margin: 0; font-size: 11px; color: #64748b; text-transform: uppercase; margin-bottom: 8px; }
        .stat-card p { margin: 0; font-size: 24px; font-weight: 800; color: var(--primary); }

        /* Table UI */
        .table-card { background: white; border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f5f9; padding: 16px; color: #475569; font-weight: 700; text-align: right; border-bottom: 2px solid var(--border); }
        td { padding: 16px; border-bottom: 1px solid #f1f5f9; color: var(--text-main); font-weight: 600; }
        tr:hover { background-color: #f8fafc; }

        /* Status Badge */
        .status-select { 
            padding: 6px 12px; border-radius: 20px; border: none; font-weight: 600; font-size: 12px; 
            cursor: pointer; transition: 0.3s; text-align: center; appearance: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            th, td { font-size: 11px; padding: 10px 5px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <h1 style="font-size: 22px; color: var(--primary);"><i class="fas fa-clipboard-list"></i> إدارة الطلبات</h1>
            <div>
                <button onclick="exportToExcel()" style="padding: 8px 16px; border-radius: 8px; border: none; background: #27ae60; color: white; font-weight: bold; cursor: pointer;"><i class="fas fa-file-excel"></i></button>
            </div>
        </div>

        <div class="stats-grid" id="stats-bar"></div>

        <div class="table-card">
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>رقم</th>
                            <th>التاريخ</th>
                            <th>العميل</th>
                            <th>الهاتف</th>
                            <th>العنوان</th>
                            <th>المنتجات</th>
                            <th>الإجمالي</th>
                            <th>الحالة</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        const client = window.supabase.createClient("https://aalpziidoobrqeppsvmi.supabase.co", "sb_publishable_Dzt7QBcxmcidwgZE3rkQcA_yoKmje1w");
        let allOrders = [];

        async function fetchOrders() {
            const { data } = await client.from('orders').select('*').order('created_at', { ascending: false });
            allOrders = data || [];
            updateStats();
            renderTable(allOrders);
        }

        function updateStats() {
            const stats = ['قيد المراجعة', 'قيد التجهيز', 'تم الشحن', 'تم التسليم', 'ملغي'];
            document.getElementById('stats-bar').innerHTML = stats.map(s => `
                <div class="stat-card"><h4>${s}</h4><p>${allOrders.filter(o => o.status === s).length}</p></div>
            `).join('');
        }

        function renderTable(data) {
            document.getElementById('orders-table-body').innerHTML = data.map(o => {
                const color = getStatusColor(o.status);
                return `<tr>
                    <td>#${o.id}</td>
                    <td>${new Date(o.created_at).toLocaleDateString('ar-EG')}</td>
                    <td>${o.customer_name || '-'}</td>
                    <td>${o.customer_phone || '-'}</td>
                    <td>${o.city || '-'}</td>
                    <td style="max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${(o.order_details || []).map(i => i.name).join('، ')}</td>
                    <td style="color:var(--secondary); font-weight:800;">${Number(o.total_amount).toLocaleString()}</td>
                    <td><select class="status-select" onchange="updateStatus(${o.id}, this.value)" style="background:${color.bg}; color:${color.text}">${['قيد المراجعة', 'قيد التجهيز', 'تم الشحن', 'تم التسليم', 'ملغي'].map(s => `<option value="${s}" ${o.status==s?'selected':''}>${s}</option>`).join('')}</select></td>
                </tr>`;
            }).join('');
        }

        function getStatusColor(s) {
            switch(s) {
                case 'تم التسليم': return { bg: '#d1fae5', text: '#065f46' };
                case 'تم الشحن': return { bg: '#dbeafe', text: '#1e40af' };
                case 'قيد التجهيز': return { bg: '#f3e8ff', text: '#6b21a8' };
                case 'ملغي': return { bg: '#fee2e2', text: '#991b1b' };
                default: return { bg: '#fef3c7', text: '#92400e' };
            }
        }

        async function updateStatus(id, val) { await client.from('orders').update({ status: val }).eq('id', id); fetchOrders(); }
        function exportToExcel() { const ws = XLSX.utils.json_to_sheet(allOrders); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Orders"); XLSX.writeFile(wb, "Arkan_Orders.xlsx"); }
        
        fetchOrders();
    </script>
</body>
</html>
