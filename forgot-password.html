<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور | شركة أركان</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header" style="text-align: center; padding: 20px 0;">
        <a href="index.html" style="text-decoration: none; display: inline-block;">
            <div class="logo" style="direction: ltr; display: flex; justify-content: center; align-items: center;">Arkan<span style="margin-left: 5px;">COMPANY</span></div>
        </a>
    </header>

    <main class="auth-page-container">
        <div class="auth-box">
            <div class="auth-header">
                <h2>نسيت كلمة المرور؟</h2>
                <p>أدخل بريدك الإلكتروني وسنرسل لك رابطاً لتعيين كلمة مرور جديدة.</p>
            </div>

            <form id="forgot-form" class="auth-form">
                <div class="input-group">
                    <label for="reset-email">البريد الإلكتروني</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="reset-email" placeholder="example@mail.com" required>
                    </div>
                </div>
                <button type="submit" class="btn-auth">إرسال رابط الاستعادة</button>
            </form>

            <div class="auth-footer">
                <p>تذكرت كلمة المرور؟ <a href="login.html">تسجيل الدخول</a></p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('reset-email').value;
            
            // توجيه المستخدم لهذه الصفحة بعد الضغط على الرابط في الإيميل
            const redirectUrl = window.location.href.replace('forgot-password.html', 'reset-password.html');
            const { data, error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                redirectTo: redirectUrl
            });

            if (error) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: error.message, confirmButtonColor: '#e74c3c' });
            } else {
                Swal.fire({
                    icon: 'success',
                    title: 'تم الإرسال!',
                    text: 'تفقد صندوق الوارد في بريدك الإلكتروني (أو مجلد Spam) للضغط على رابط التحديث.',
                    confirmButtonColor: '#2ecc71'
                });
            }
        });
    </script>
</body>
</html>
